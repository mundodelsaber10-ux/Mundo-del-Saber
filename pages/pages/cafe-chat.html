<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <meta name="theme-color" content="#E8922A">
  <title>Chat Docente · Mundo del Saber</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { background: var(--cafe-light); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

    /* ── HEADER ── */
    .hdr {
      background: linear-gradient(135deg, #B56A0F, #E8922A);
      padding: 16px 20px; flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      position: relative; overflow: hidden;
    }
    .hdr::before { content:'📩'; position:absolute; right:-8px; top:-10px; font-size:5rem; opacity:.12; pointer-events:none; }
    .back-btn { width:38px; height:38px; border-radius:12px; background:rgba(255,255,255,.2); border:none; color:white; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .hdr-text { flex: 1; }
    .hdr-title { font-family:var(--font-display); font-size:1.1rem; font-weight:800; color:white; }
    .hdr-sub   { font-size:.78rem; color:rgba(255,255,255,.8); margin-top:1px; }

    /* ── VISTA: LISTA DE DOCENTES ── */
    #teacherListView { flex: 1; overflow-y: auto; padding: 16px 16px 20px; }
    .teacher-item {
      background: white; border-radius: var(--radius-xl);
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; border: 1.5px solid var(--border);
      transition: transform .15s, box-shadow .15s;
    }
    .teacher-item:hover  { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .teacher-item:active { transform: scale(.98); }
    .teacher-avatar {
      width: 46px; height: 46px; border-radius: 14px;
      background: var(--creativo-light);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 1rem; font-weight: 800;
      color: var(--creativo-dark); flex-shrink: 0;
    }
    .teacher-info { flex: 1; }
    .teacher-name    { font-size: .95rem; font-weight: 700; color: var(--text); }
    .teacher-role    { font-size: .75rem; color: var(--text-2); margin-top: 2px; }
    .teacher-preview { font-size: .78rem; color: var(--text-3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .unread-badge {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--cafe); color: white;
      font-size: .68rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .teacher-time { font-size: .7rem; color: var(--text-3); flex-shrink: 0; }

    /* ── VISTA: CONVERSACIÓN ── */
    #chatView { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chatView.hidden { display: none; }

    .chat-header {
      background: white; border-bottom: 1.5px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .chat-back { width:34px; height:34px; border-radius:10px; background:var(--cafe-light); border:none; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .chat-avatar { width:38px; height:38px; border-radius:11px; background:var(--creativo-light); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:.9rem; font-weight:800; color:var(--creativo-dark); flex-shrink:0; }
    .chat-name { font-weight:700; font-size:.95rem; color:var(--text); }
    .chat-role { font-size:.72rem; color:var(--text-2); }

    /* Mensajes */
    #messagesArea { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.mine { flex-direction: row-reverse; }

    .msg-bubble {
      max-width: 75%; padding: 10px 14px;
      border-radius: 18px; font-size: .9rem; line-height: 1.45;
      box-shadow: var(--shadow-sm);
    }
    .msg-row:not(.mine) .msg-bubble {
      background: white; color: var(--text);
      border-radius: 4px 18px 18px 18px;
      border: 1.5px solid var(--border);
    }
    .msg-row.mine .msg-bubble {
      background: var(--cafe); color: white;
      border-radius: 18px 4px 18px 18px;
    }
    .msg-time { font-size: .65rem; color: var(--text-3); flex-shrink: 0; margin-bottom: 4px; }
    .msg-row.mine .msg-time { text-align: right; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--creativo-light);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 800; color: var(--creativo-dark);
      flex-shrink: 0; margin-bottom: 2px;
      font-family: var(--font-display);
    }

    .date-divider {
      text-align: center; font-size: .72rem; color: var(--text-3);
      margin: 4px 0; position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
      position: absolute; top: 50%; width: 28%;
    }
    .date-divider::before { left: 0; }
    .date-divider::after  { right: 0; }

    /* Input de mensaje */
    .chat-input-bar {
      background: white; border-top: 1.5px solid var(--border);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .msg-input {
      flex: 1; padding: 10px 14px; border-radius: var(--radius-full);
      border: 1.5px solid var(--border); font-size: .92rem;
      font-family: var(--font-body); color: var(--text);
      resize: none; max-height: 100px; overflow-y: auto;
      transition: border-color .2s;
      line-height: 1.4;
    }
    .msg-input:focus { border-color: var(--cafe); outline: none; }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--cafe); color: white; border: none;
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s, box-shadow .1s;
      box-shadow: 0 3px 10px rgba(232,146,42,.35);
    }
    .send-btn:hover  { transform: scale(1.08); }
    .send-btn:active { transform: scale(.92); }
    .send-btn:disabled { opacity: .45; pointer-events: none; }

    /* ── ESTADOS ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-3); }
    .empty-state .ico { font-size: 2.8rem; margin-bottom: 10px; }
    .empty-state p { font-size: .9rem; }

    .section-label { font-family: var(--font-display); font-size: .9rem; font-weight: 700; color: var(--cafe-dark); margin-bottom: 10px; padding: 0 2px; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { background: white; border-top: 1.5px solid var(--border); display: flex; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); flex-shrink: 0; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; font-size: .65rem; font-weight: 700; color: var(--text-3); cursor: pointer; }
    .nav-btn .nav-ico { font-size: 1.4rem; }
    .nav-btn.active { color: var(--cafe-dark); }
  </style>
</head>
<body>

  <div id="page-loader">
    <div style="display:flex;gap:8px;">
      <div class="loader-dot" style="background:var(--cafe)"></div>
      <div class="loader-dot" style="background:var(--cafe)"></div>
      <div class="loader-dot" style="background:var(--cafe)"></div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="hdr">
    <button class="back-btn" id="mainBack" onclick="goBack()">←</button>
    <div class="hdr-text">
      <p class="hdr-title" id="hdrTitle">Chat con docentes</p>
      <p class="hdr-sub"   id="hdrSub">Mensajes privados</p>
    </div>
  </div>

  <!-- LISTA DE DOCENTES -->
  <div id="teacherListView" style="display:none">
    <p class="section-label">Docentes disponibles</p>
    <div id="teacherList"></div>
  </div>

  <!-- CONVERSACIÓN -->
  <div id="chatView" class="hidden">
    <div class="chat-header">
      <button class="chat-back" onclick="showTeacherList()">←</button>
      <div class="chat-avatar" id="chatAvatar">?</div>
      <div>
        <p class="chat-name" id="chatName">Docente</p>
        <p class="chat-role" id="chatRole">Docente titular</p>
      </div>
    </div>

    <div id="messagesArea"></div>

    <div class="chat-input-bar">
      <textarea class="msg-input" id="msgInput" placeholder="Escribe un mensaje..."
                rows="1" maxlength="500"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
                oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='cafe.html'">
      <span class="nav-ico">🏠</span><span>Inicio</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='cafe-foro.html'">
      <span class="nav-ico">💬</span><span>Foro</span>
    </button>
    <button class="nav-btn active">
      <span class="nav-ico">📩</span><span>Chat</span>
    </button>
    <button class="nav-btn" onclick="logout()">
      <span class="nav-ico">🚪</span><span>Salir</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>

    /* ══════════════════════════════════════════
       ESTADO
    ══════════════════════════════════════════ */
    let profile       = null;
    let activeTeacher = null;
    let pollInterval  = null;
    let lastMsgId     = null;

    /* ══════════════════════════════════════════
       INIT
    ══════════════════════════════════════════ */
    async function init() {
      const { data:{ session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../index.html'; return; }

      const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      if (!data) { window.location.href = '../index.html'; return; }
      profile = data;

      hideLoader();

      // Si es docente, mostrar sus conversaciones con padres
      // Si es padre, mostrar lista de docentes disponibles
      if (['teacher','specialist'].includes(data.role)) {
        document.getElementById('hdrSub').textContent = 'Mensajes de familias';
        await loadParentConversations();
      } else {
        await loadTeachers();
      }
    }

    /* ══════════════════════════════════════════
       CARGAR DOCENTES (vista de padre)
    ══════════════════════════════════════════ */
    async function loadTeachers() {
      const view = document.getElementById('teacherListView');
      view.style.display = 'block';

      const { data: teachers } = await sb
        .from('profiles')
        .select('*')
        .in('role', ['teacher','specialist'])
        .order('full_name');

      const list = document.getElementById('teacherList');

      if (!teachers || teachers.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="ico">👨‍🏫</div><p style="font-weight:700;color:var(--text)">Sin docentes registrados</p><p style="margin-top:4px;font-size:.82rem">Cuando los docentes se registren aparecerán aquí.</p></div>`;
        return;
      }

      // Cargar último mensaje de cada conversación
      const { data: lastMsgs } = await sb
        .from('parent_teacher_messages')
        .select('*')
        .or(`sender_id.eq.${profile.id},receiver_id.eq.${profile.id}`)
        .order('created_at', { ascending: false });

      // Agrupar por conversación
      const convMap = {};
      lastMsgs?.forEach(m => {
        const otherId = m.sender_id === profile.id ? m.receiver_id : m.sender_id;
        if (!convMap[otherId]) convMap[otherId] = m;
      });

      // Contar no leídos
      const unreadMap = {};
      lastMsgs?.forEach(m => {
        if (m.receiver_id === profile.id && !m.read_at) {
          unreadMap[m.sender_id] = (unreadMap[m.sender_id] || 0) + 1;
        }
      });

      list.innerHTML = '';
      teachers.forEach(t => {
        const initials = t.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
        const lastMsg  = convMap[t.id];
        const unread   = unreadMap[t.id] || 0;
        const roleLabel = t.role === 'specialist' ? 'Especialista' : 'Docente titular';

        const item = document.createElement('div');
        item.className = 'teacher-item';
        item.innerHTML = `
          <div class="teacher-avatar">${initials}</div>
          <div class="teacher-info">
            <p class="teacher-name">${esc(cleanName(t.full_name) || 'Docente')}</p>
            <p class="teacher-role">${roleLabel}</p>
            ${lastMsg ? `<p class="teacher-preview">${esc(lastMsg.content)}</p>` : '<p class="teacher-preview">Iniciar conversación</p>'}
          </div>
          ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
          ${lastMsg ? `<span class="teacher-time">${fmtTime(lastMsg.created_at)}</span>` : ''}`;
        item.onclick = () => openChat(t);
        list.appendChild(item);
      });
    }

    /* ══════════════════════════════════════════
       CARGAR CONVERSACIONES (vista de docente)
    ══════════════════════════════════════════ */
    async function loadParentConversations() {
      const view = document.getElementById('teacherListView');
      view.style.display = 'block';
      document.getElementById('section-label')?.remove();

      const label = document.createElement('p');
      label.className = 'section-label';
      label.textContent = 'Familias que te han escrito';
      view.prepend(label);

      // Obtener todos los mensajes que involucran al docente
      const { data: msgs } = await sb
        .from('parent_teacher_messages')
        .select('*, sender:sender_id(id,full_name,role), receiver:receiver_id(id,full_name,role)')
        .or(`sender_id.eq.${profile.id},receiver_id.eq.${profile.id}`)
        .order('created_at', { ascending: false });

      const list = document.getElementById('teacherList');

      if (!msgs || msgs.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="ico">💬</div><p style="font-weight:700;color:var(--text)">Sin mensajes aún</p><p style="margin-top:4px;font-size:.82rem">Los padres aparecerán aquí cuando te escriban.</p></div>`;
        return;
      }

      // Agrupar por interlocutor
      const seenIds = new Set();
      const convs   = [];
      msgs.forEach(m => {
        const other = m.sender_id === profile.id ? m.receiver : m.sender;
        if (other && !seenIds.has(other.id)) {
          seenIds.add(other.id);
          convs.push({ other, lastMsg: m });
        }
      });

      // Contar no leídos
      const unreadMap = {};
      msgs.forEach(m => {
        if (m.receiver_id === profile.id && !m.read_at) {
          unreadMap[m.sender_id] = (unreadMap[m.sender_id] || 0) + 1;
        }
      });

      list.innerHTML = '';
      convs.forEach(({ other, lastMsg }) => {
        const initials = other.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
        const unread   = unreadMap[other.id] || 0;

        const item = document.createElement('div');
        item.className = 'teacher-item';
        item.innerHTML = `
          <div class="teacher-avatar" style="background:var(--cafe-light);color:var(--cafe-dark)">${initials}</div>
          <div class="teacher-info">
            <p class="teacher-name">${esc(cleanName(other.full_name) || 'Familiar')}</p>
            <p class="teacher-role">Padre / Familiar</p>
            <p class="teacher-preview">${esc(lastMsg.content)}</p>
          </div>
          ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
          <span class="teacher-time">${fmtTime(lastMsg.created_at)}</span>`;
        item.onclick = () => openChat(other);
        list.appendChild(item);
      });
    }

    /* ══════════════════════════════════════════
       ABRIR CHAT
    ══════════════════════════════════════════ */
    function openChat(teacher) {
      activeTeacher = teacher;

      // Header del chat
      const initials = teacher.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
      document.getElementById('chatAvatar').textContent = initials;
      document.getElementById('chatName').textContent   = cleanName(teacher.full_name) || 'Docente';
      document.getElementById('chatRole').textContent   =
        teacher.role === 'specialist' ? 'Especialista' :
        teacher.role === 'teacher'    ? 'Docente titular' : 'Familiar';

      document.getElementById('hdrTitle').textContent = cleanName(teacher.full_name)?.split(' ')[0] || 'Chat';
      document.getElementById('hdrSub').textContent   = 'Conversación privada';

      document.getElementById('teacherListView').style.display = 'none';
      document.getElementById('chatView').classList.remove('hidden');

      // Cargar mensajes y marcar como leídos
      loadMessages();
      markAsRead();

      // Polling cada 5s para nuevos mensajes
      clearInterval(pollInterval);
      pollInterval = setInterval(pollNewMessages, 5000);
    }

    function showTeacherList() {
      clearInterval(pollInterval);
      activeTeacher = null;
      document.getElementById('chatView').classList.add('hidden');
      document.getElementById('teacherListView').style.display = 'block';
      document.getElementById('hdrTitle').textContent = 'Chat con docentes';
      document.getElementById('hdrSub').textContent   = 'Mensajes privados';

      // Refrescar lista
      if (['teacher','specialist'].includes(profile.role)) loadParentConversations();
      else loadTeachers();
    }

    /* ══════════════════════════════════════════
       CARGAR MENSAJES
    ══════════════════════════════════════════ */
    async function loadMessages() {
      const area = document.getElementById('messagesArea');
      area.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-3);font-size:.85rem">Cargando...</div>';

      const { data: msgs } = await sb
        .from('parent_teacher_messages')
        .select('*')
        .or(
          `and(sender_id.eq.${profile.id},receiver_id.eq.${activeTeacher.id}),and(sender_id.eq.${activeTeacher.id},receiver_id.eq.${profile.id})`
        )
        .order('created_at', { ascending: true });

      renderMessages(msgs || []);

      if (msgs && msgs.length > 0) {
        lastMsgId = msgs[msgs.length - 1].id;
      }

      scrollBottom();
    }

    function renderMessages(msgs) {
      const area = document.getElementById('messagesArea');
      area.innerHTML = '';

      if (msgs.length === 0) {
        area.innerHTML = `<div class="empty-state"><div class="ico">💬</div><p style="font-weight:700;color:var(--text)">Sin mensajes aún</p><p style="margin-top:4px;font-size:.82rem">Envía el primer mensaje.</p></div>`;
        return;
      }

      let lastDate = '';
      msgs.forEach(m => {
        const mine    = m.sender_id === profile.id;
        const msgDate = new Date(m.created_at).toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});

        // Separador de fecha
        if (msgDate !== lastDate) {
          lastDate = msgDate;
          const div = document.createElement('div');
          div.className = 'date-divider';
          div.textContent = msgDate;
          area.appendChild(div);
        }

        const row = document.createElement('div');
        row.className = `msg-row${mine ? ' mine' : ''}`;
        row.id = `msg-${m.id}`;

        const time = new Date(m.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});

        if (!mine) {
          const initials = activeTeacher.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
          row.innerHTML = `
            <div class="msg-avatar">${initials}</div>
            <div>
              <div class="msg-bubble">${esc(m.content)}</div>
              <div class="msg-time">${time}</div>
            </div>`;
        } else {
          row.innerHTML = `
            <div>
              <div class="msg-bubble">${esc(m.content)}</div>
              <div class="msg-time">${time} ${m.read_at ? '✓✓' : '✓'}</div>
            </div>`;
        }
        area.appendChild(row);
      });
    }

    /* ══════════════════════════════════════════
       POLLING — nuevos mensajes
    ══════════════════════════════════════════ */
    async function pollNewMessages() {
      if (!activeTeacher) return;

      const query = sb
        .from('parent_teacher_messages')
        .select('*')
        .or(
          `and(sender_id.eq.${profile.id},receiver_id.eq.${activeTeacher.id}),and(sender_id.eq.${activeTeacher.id},receiver_id.eq.${profile.id})`
        )
        .order('created_at', { ascending: true });

      if (lastMsgId) query.gt('created_at', new Date(
        // obtener la fecha del último mensaje
        (await sb.from('parent_teacher_messages').select('created_at').eq('id', lastMsgId).single()).data?.created_at || 0
      ).toISOString());

      const { data: newMsgs } = await query;

      if (newMsgs && newMsgs.length > 0) {
        const area = document.getElementById('messagesArea');
        // Quitar empty state si existe
        if (area.querySelector('.empty-state')) area.innerHTML = '';

        newMsgs.forEach(m => {
          if (document.getElementById(`msg-${m.id}`)) return; // ya existe
          const mine = m.sender_id === profile.id;
          const row  = document.createElement('div');
          row.className = `msg-row${mine ? ' mine' : ''}`;
          row.id = `msg-${m.id}`;
          const time = new Date(m.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
          if (!mine) {
            const initials = activeTeacher.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
            row.innerHTML = `<div class="msg-avatar">${initials}</div><div><div class="msg-bubble">${esc(m.content)}</div><div class="msg-time">${time}</div></div>`;
          } else {
            row.innerHTML = `<div><div class="msg-bubble">${esc(m.content)}</div><div class="msg-time">${time}</div></div>`;
          }
          area.appendChild(row);
          lastMsgId = m.id;
        });
        scrollBottom();
        markAsRead();
      }
    }

    /* ══════════════════════════════════════════
       ENVIAR MENSAJE
    ══════════════════════════════════════════ */
    async function sendMessage() {
      const input   = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content || !activeTeacher) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value  = '';
      input.style.height = '';

      const { data: msg, error } = await sb.from('parent_teacher_messages').insert({
        sender_id:   profile.id,
        receiver_id: activeTeacher.id,
        content,
      }).select().single();

      btn.disabled = false;

      if (error) { showToast('Error al enviar', 'error'); return; }

      // Agregar mensaje inmediatamente sin esperar al poll
      const area = document.getElementById('messagesArea');
      if (area.querySelector('.empty-state')) area.innerHTML = '';

      const row = document.createElement('div');
      row.className = 'msg-row mine';
      row.id = `msg-${msg.id}`;
      const time = new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
      row.innerHTML = `<div><div class="msg-bubble">${esc(content)}</div><div class="msg-time">${time} ✓</div></div>`;
      area.appendChild(row);
      lastMsgId = msg.id;
      scrollBottom();
    }

    /* ══════════════════════════════════════════
       MARCAR COMO LEÍDO
    ══════════════════════════════════════════ */
    async function markAsRead() {
      if (!activeTeacher) return;
      await sb.from('parent_teacher_messages')
        .update({ read_at: new Date().toISOString() })
        .eq('receiver_id', profile.id)
        .eq('sender_id', activeTeacher.id)
        .is('read_at', null);
    }

    /* ══════════════════════════════════════════
       NAVEGACIÓN
    ══════════════════════════════════════════ */
    function goBack() {
      if (activeTeacher) { showTeacherList(); return; }
      clearInterval(pollInterval);
      window.location.href = 'cafe.html';
    }

    /* ══════════════════════════════════════════
       UTILIDADES
    ══════════════════════════════════════════ */
    function scrollBottom() {
      const area = document.getElementById('messagesArea');
      setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
    }

    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function fmtTime(d) {
      const date = new Date(d);
      const now  = new Date();
      const diff = now - date;
      if (diff < 60000)      return 'Ahora';
      if (diff < 3600000)    return `${Math.floor(diff/60000)}m`;
      if (diff < 86400000)   return date.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
      return date.toLocaleDateString('es',{day:'numeric',month:'short'});
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function logout() {
      clearInterval(pollInterval);
      await sb.auth.signOut();
      window.location.href = '../index.html';
    }

    init();
  </script>
</body>
</html>
