<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../favicon.ico">
  <meta name="theme-color" content="#E8922A">
  <title>Foro del Café · Storyboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { background: var(--cafe-light); }

    .hdr {
      background: linear-gradient(135deg, #B56A0F, #E8922A);
      padding: 16px 20px 20px; position: relative; overflow: hidden;
    }
    .hdr::before { content:'💬'; position:absolute; right:-8px; top:-10px; font-size:6rem; opacity:.15; pointer-events:none; }
    .hdr-top { display:flex; align-items:center; gap:12px; }
    .back-btn { width:38px; height:38px; border-radius:12px; background:rgba(255,255,255,.25); border:none; color:white; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .hdr-title { font-family:var(--font-display); font-size:1.3rem; font-weight:800; color:white; }
    .hdr-sub   { font-size:.8rem; color:rgba(255,255,255,.8); }

    /* ——— FILTROS ——— */
    .filters {
      display:flex; gap:8px; overflow-x:auto; padding:14px 16px 0;
      scrollbar-width:none; max-width:480px; margin:0 auto;
    }
    .filters::-webkit-scrollbar { display:none; }
    .filter-chip {
      background:white; border:1.5px solid var(--cafe-soft);
      border-radius:var(--radius-full); padding:6px 14px;
      font-size:.82rem; font-weight:700; color:var(--text-2);
      cursor:pointer; white-space:nowrap; flex-shrink:0;
      transition:background .15s, color .15s, border-color .15s;
    }
    .filter-chip.active { background:var(--cafe); color:white; border-color:var(--cafe); }

    /* ——— CONTENIDO ——— */
    .content { padding:16px 16px 100px; max-width:480px; margin:0 auto; }

    /* ——— POSTS ——— */
    .posts-list { display:flex; flex-direction:column; gap:12px; }

    .post-card {
      background:white; border-radius:var(--radius-xl);
      padding:18px; border:1.5px solid var(--border);
      box-shadow:var(--shadow-sm);
    }
    .post-header { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; }
    .post-avatar {
      width:40px; height:40px; border-radius:12px;
      background:var(--cafe-light); display:flex;
      align-items:center; justify-content:center;
      font-size:.95rem; font-weight:800; color:var(--cafe-dark);
      flex-shrink:0; font-family:var(--font-display);
    }
    .post-author { font-size:.88rem; font-weight:700; color:var(--text); }
    .post-meta   { font-size:.72rem; color:var(--text-2); margin-top:2px; display:flex; gap:6px; align-items:center; }
    .post-badge  {
      font-size:.65rem; padding:2px 8px; border-radius:var(--radius-full);
      font-weight:700;
    }
    .badge-general  { background:#FFF3E0; color:#E65100; }
    .badge-duda     { background:#E3F2FD; color:#1565C0; }
    .badge-anuncio  { background:#FCE4EC; color:#880E4F; }
    .badge-especialista { background:var(--creativo-light); color:var(--creativo-dark); }

    .post-content { font-size:.9rem; color:var(--text); line-height:1.55; margin-bottom:12px; }

    .post-footer { display:flex; align-items:center; gap:8px; }
    .like-btn {
      display:inline-flex; align-items:center; gap:4px;
      background:var(--cafe-light); border:1.5px solid var(--cafe-soft);
      border-radius:var(--radius-full); padding:5px 12px;
      font-size:.8rem; font-weight:700; color:var(--cafe-dark);
      cursor:pointer; transition:background .15s;
    }
    .like-btn:hover    { background:var(--cafe-soft); }
    .like-btn.liked    { background:var(--cafe); color:white; border-color:var(--cafe); }
    .reply-btn {
      display:inline-flex; align-items:center; gap:4px;
      background:white; border:1.5px solid var(--border);
      border-radius:var(--radius-full); padding:5px 12px;
      font-size:.8rem; font-weight:700; color:var(--text-2);
      cursor:pointer; transition:background .15s;
    }
    .reply-btn:hover { background:var(--bg); }
    .post-time { margin-left:auto; font-size:.72rem; color:var(--text-3); }

    /* Replies */
    .replies-section { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); display:none; }
    .replies-section.open { display:block; }
    .reply-item { display:flex; gap:8px; margin-bottom:10px; }
    .reply-avatar {
      width:30px; height:30px; border-radius:8px;
      background:var(--cafe-light); display:flex;
      align-items:center; justify-content:center;
      font-size:.75rem; font-weight:800; color:var(--cafe-dark);
      flex-shrink:0; font-family:var(--font-display);
    }
    .reply-bubble {
      background:var(--bg); border-radius:0 var(--radius-md) var(--radius-md) var(--radius-md);
      padding:8px 12px; flex:1;
    }
    .reply-author { font-size:.78rem; font-weight:700; color:var(--text); margin-bottom:2px; }
    .reply-text   { font-size:.82rem; color:var(--text); line-height:1.4; }

    .reply-input-wrap { display:flex; gap:8px; margin-top:8px; }
    .reply-input {
      flex:1; padding:8px 12px; border-radius:var(--radius-full);
      border:1.5px solid var(--border); font-size:.85rem;
      background:var(--bg); color:var(--text); font-family:var(--font-body);
    }
    .reply-input:focus { border-color:var(--cafe); outline:none; }
    .reply-send {
      width:36px; height:36px; border-radius:50%;
      background:var(--cafe); color:white; border:none;
      cursor:pointer; font-size:1rem; flex-shrink:0;
      transition:transform .1s;
    }
    .reply-send:active { transform:scale(.9); }

    /* ——— FAB: Nuevo post ——— */
    .fab {
      position:fixed; bottom:calc(70px + env(safe-area-inset-bottom)); right:20px;
      width:56px; height:56px; border-radius:50%;
      background:var(--cafe); color:white; border:none;
      font-size:1.6rem; cursor:pointer; z-index:50;
      box-shadow:0 6px 20px rgba(232,146,42,.4);
      display:flex; align-items:center; justify-content:center;
      transition:transform .15s, box-shadow .15s;
    }
    .fab:hover  { transform:scale(1.08); box-shadow:0 8px 24px rgba(232,146,42,.5); }
    .fab:active { transform:scale(.95); }

    /* ——— BOTTOM NAV ——— */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1.5px solid var(--border); display:flex; padding:10px 0 calc(10px + env(safe-area-inset-bottom)); z-index:100; }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 4px; font-size:.65rem; font-weight:700; color:var(--text-3); cursor:pointer; }
    .nav-btn .nav-ico { font-size:1.4rem; }
    .nav-btn.active { color:var(--cafe-dark); }

    /* ——— MODAL: Nuevo post ——— */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; visibility:hidden; transition:opacity .25s, visibility .25s; }
    .modal-overlay.open { opacity:1; visibility:visible; }
    .modal-sheet { background:white; border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:24px 20px calc(32px + env(safe-area-inset-bottom)); width:100%; max-width:480px; transform:translateY(100%); transition:transform .35s cubic-bezier(.16,1,.3,1); }
    .modal-overlay.open .modal-sheet { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:var(--radius-full); margin:0 auto 20px; }
    .modal-title { font-family:var(--font-display); font-size:1.3rem; font-weight:800; margin-bottom:16px; }

    .cat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
    .cat-btn {
      padding:10px 8px; border-radius:var(--radius-md); border:2px solid var(--border);
      font-size:.82rem; font-weight:700; color:var(--text-2); cursor:pointer;
      background:white; transition:border-color .15s, color .15s, background .15s;
      text-align:center;
    }
    .cat-btn span { display:block; font-size:1.2rem; margin-bottom:3px; }
    .cat-btn.sel { border-color:var(--cafe); background:var(--cafe-light); color:var(--cafe-dark); }

    .btn-cafe { background:var(--cafe); color:white; box-shadow:0 4px 14px rgba(232,146,42,.35); }
    .char-count { font-size:.75rem; color:var(--text-3); text-align:right; margin-top:4px; }

    .empty-state { text-align:center; padding:48px 20px; color:var(--text-3); }
    .empty-state .ico { font-size:2.8rem; margin-bottom:10px; }
    .empty-state p { font-size:.9rem; }
  </style>
</head>
<body>

  <div id="page-loader">
    <div style="display:flex;gap:8px;">
      <div class="loader-dot" style="background:var(--cafe)"></div>
      <div class="loader-dot" style="background:var(--cafe)"></div>
      <div class="loader-dot" style="background:var(--cafe)"></div>
    </div>
  </div>

  <div class="hdr">
    <div class="hdr-top">
      <button class="back-btn" onclick="window.location.href='cafe.html'">←</button>
      <div>
        <p class="hdr-title">Foro del Café 💬</p>
        <p class="hdr-sub">Comparte, pregunta y apoya</p>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <button class="filter-chip active" data-cat="all"     onclick="filterPosts('all', this)">🗂 Todos</button>
    <button class="filter-chip"        data-cat="general" onclick="filterPosts('general', this)">💬 General</button>
    <button class="filter-chip"        data-cat="duda"    onclick="filterPosts('duda', this)">❓ Dudas</button>
    <button class="filter-chip"        data-cat="anuncio" onclick="filterPosts('anuncio', this)">📢 Anuncios</button>
    <button class="filter-chip"        data-cat="especialista" onclick="filterPosts('especialista', this)">🎓 Especialistas</button>
  </div>

  <div class="content">
    <div class="posts-list" id="postsList">
      <div class="empty-state">
        <div class="ico">☕</div>
        <p>Cargando conversaciones...</p>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openNewPostModal()" aria-label="Nuevo post">✏️</button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='cafe.html'">
      <span class="nav-ico">🏠</span><span>Inicio</span>
    </button>
    <button class="nav-btn active">
      <span class="nav-ico">💬</span><span>Foro</span>
    </button>
    <button class="nav-btn" onclick="openNewPostModal()">
      <span class="nav-ico">✏️</span><span>Publicar</span>
    </button>
    <button class="nav-btn" onclick="logout()">
      <span class="nav-ico">🚪</span><span>Salir</span>
    </button>
  </nav>

  <!-- MODAL: Nuevo post -->
  <div class="modal-overlay" id="newPostModal"
       onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">✏️ Nueva publicación</p>

      <p style="font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:8px">Categoría:</p>
      <div class="cat-grid">
        <button class="cat-btn sel" data-cat="general"      onclick="selectCat('general',this)"><span>💬</span>General</button>
        <button class="cat-btn"     data-cat="duda"         onclick="selectCat('duda',this)"><span>❓</span>Duda</button>
        <button class="cat-btn"     data-cat="anuncio"      onclick="selectCat('anuncio',this)"><span>📢</span>Anuncio</button>
      </div>

      <div class="field-group">
        <textarea class="field-input" id="postContent" rows="4"
                  maxlength="500"
                  placeholder="¿Qué quieres compartir con la comunidad?"
                  oninput="document.getElementById('postCharCount').textContent=this.value.length"
                  style="resize:none"></textarea>
        <p class="char-count"><span id="postCharCount">0</span>/500</p>
      </div>

      <button class="btn btn-cafe btn-xl" id="btnPublishPost" onclick="publishPost()">
        Publicar →
      </button>
      <button class="btn btn-ghost" style="width:100%;margin-top:6px"
              onclick="document.getElementById('newPostModal').classList.remove('open')">
        Cancelar
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>

    let profile     = null;
    let allPosts    = [];
    let currentCat  = 'all';
    let selectedCat = 'general';

    const CAT_CONFIG = {
      general:     { label:'General',      badgeClass:'badge-general',     emoji:'💬' },
      duda:        { label:'Duda',          badgeClass:'badge-duda',        emoji:'❓' },
      anuncio:     { label:'Anuncio',       badgeClass:'badge-anuncio',     emoji:'📢' },
      especialista:{ label:'Especialista',  badgeClass:'badge-especialista', emoji:'🎓' },
    };

    /* ============ INIT ============ */
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../index.html'; return; }
      const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      if (!data) { window.location.href = '../index.html'; return; }
      profile = data;

      // Si es especialista, agregar categoría especial
      if (data.role === 'specialist') {
        document.querySelector('[data-cat="especialista"]')
          ?.classList.add('active');
      }

      await loadPosts();
      hideLoader();
    }

    /* ============ CARGAR POSTS ============ */
    async function loadPosts() {
      const { data } = await sb
        .from('posts')
        .select('*, profiles(full_name, role)')
        .order('created_at', { ascending: false })
        .limit(30);

      allPosts = data || [];
      renderPosts();
    }

    function renderPosts() {
      const list = document.getElementById('postsList');
      const filtered = currentCat === 'all'
        ? allPosts
        : allPosts.filter(p => p.category === currentCat);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="ico">☕</div>
          <p style="font-weight:700;color:var(--text);font-size:.95rem">Sin publicaciones aún</p>
          <p style="margin-top:4px;font-size:.82rem">¡Sé el primero en compartir algo!</p>
        </div>`;
        return;
      }

      list.innerHTML = '';
      filtered.forEach(post => {
        const cat     = CAT_CONFIG[post.category] || CAT_CONFIG.general;
        const initials= post.profiles?.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
        const date    = new Date(post.created_at).toLocaleDateString('es',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
        const isSpec  = post.profiles?.role === 'specialist';

        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
          <div class="post-header">
            <div class="post-avatar">${initials}</div>
            <div style="flex:1">
              <p class="post-author">
                ${post.profiles?.full_name || 'Anónimo'}
                ${isSpec ? ' 🎓' : ''}
              </p>
              <div class="post-meta">
                <span class="post-badge ${cat.badgeClass}">${cat.emoji} ${cat.label}</span>
              </div>
            </div>
          </div>
          <p class="post-content">${escHtml(post.content)}</p>
          <div class="post-footer">
            <button class="like-btn" data-id="${post.id}" data-likes="${post.likes || 0}"
                    onclick="toggleLike(this, '${post.id}')">
              🤍 ${post.likes || 0}
            </button>
            <button class="reply-btn" onclick="toggleReplies(this, '${post.id}')">
              💬 Responder
            </button>
            <span class="post-time">${date}</span>
          </div>
          <div class="replies-section" id="replies-${post.id}">
            <div class="replies-list" id="rlist-${post.id}"></div>
            <div class="reply-input-wrap">
              <input class="reply-input" id="rinput-${post.id}" type="text"
                     placeholder="Escribe una respuesta..." maxlength="300">
              <button class="reply-send" onclick="sendReply('${post.id}')">↑</button>
            </div>
          </div>`;
        list.appendChild(card);
      });
    }

    function escHtml(str) {
      return str?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') || '';
    }

    /* ============ FILTRAR ============ */
    function filterPosts(cat, btn) {
      currentCat = cat;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPosts();
    }

    /* ============ LIKES ============ */
    async function toggleLike(btn, postId) {
      if (btn.classList.contains('liked')) return;
      btn.classList.add('liked');
      const newLikes = (parseInt(btn.dataset.likes) || 0) + 1;
      btn.textContent = `❤️ ${newLikes}`;
      btn.dataset.likes = newLikes;
      await sb.from('posts').update({ likes: newLikes }).eq('id', postId);
    }

    /* ============ RESPUESTAS ============ */
    async function toggleReplies(btn, postId) {
      const section = document.getElementById(`replies-${postId}`);
      const isOpen  = section.classList.contains('open');
      section.classList.toggle('open');
      if (!isOpen) await loadReplies(postId);
    }

    async function loadReplies(postId) {
      const list = document.getElementById(`rlist-${postId}`);
      list.innerHTML = '';
      const { data } = await sb
        .from('posts')
        .select('*, profiles(full_name)')
        .eq('category', `reply:${postId}`)
        .order('created_at', { ascending: true })
        .limit(20);

      if (!data || data.length === 0) return;
      data.forEach(r => {
        const initials = r.profiles?.full_name?.split(' ').map(w=>w[0]).slice(0,2).join('') || '?';
        const item = document.createElement('div');
        item.className = 'reply-item';
        item.innerHTML = `
          <div class="reply-avatar">${initials}</div>
          <div class="reply-bubble">
            <p class="reply-author">${r.profiles?.full_name || 'Anónimo'}</p>
            <p class="reply-text">${escHtml(r.content)}</p>
          </div>`;
        list.appendChild(item);
      });
    }

    async function sendReply(postId) {
      const input   = document.getElementById(`rinput-${postId}`);
      const content = input.value.trim();
      if (!content) return;

      await sb.from('posts').insert({
        author_id: profile.id,
        content,
        category: `reply:${postId}`,
      });

      input.value = '';
      await loadReplies(postId);
    }

    /* ============ NUEVO POST ============ */
    function openNewPostModal() {
      document.getElementById('postContent').value = '';
      document.getElementById('postCharCount').textContent = '0';
      document.getElementById('newPostModal').classList.add('open');
      setTimeout(() => document.getElementById('postContent').focus(), 350);
    }

    function selectCat(cat, btn) {
      selectedCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    }

    async function publishPost() {
      const content = document.getElementById('postContent').value.trim();
      if (content.length < 5) { showToast('Escribe algo más antes de publicar', 'error'); return; }

      const btn = document.getElementById('btnPublishPost');
      setButtonLoading(btn, true);

      const { error } = await sb.from('posts').insert({
        author_id: profile.id,
        content,
        category:  profile.role === 'specialist' ? 'especialista' : selectedCat,
        likes:     0,
      });

      setButtonLoading(btn, false);
      if (error) { showToast('Error al publicar', 'error'); return; }

      document.getElementById('newPostModal').classList.remove('open');
      showToast('¡Publicado! ☕', 'success');
      await loadPosts();
    }

    /* ============ LOGOUT ============ */
    async function logout() {
      await sb.auth.signOut();
      window.location.href = '../index.html';
    }

    init();
  </script>
</body>
</html>
