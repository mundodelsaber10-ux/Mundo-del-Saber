<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../favicon.ico">
  <meta name="theme-color" content="#FF9800">
  <title>Matemáticas · Storyboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { background: #FFF8E1; }

    /* ——— HEADER ——— */
    .hdr {
      background: linear-gradient(135deg, #FF9800, #F44336);
      padding: 16px 20px 20px;
      position: relative; overflow: hidden;
    }
    .hdr::before {
      content: '🔢';
      position: absolute; right: -8px; top: -10px;
      font-size: 6rem; opacity: .15; pointer-events: none;
    }
    .hdr-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .back-btn {
      width: 38px; height: 38px; border-radius: 12px;
      background: rgba(255,255,255,.25); border: none;
      color: white; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hdr-title {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 800; color: white;
    }
    .hdr-sub { font-size: .8rem; color: rgba(255,255,255,.8); }

    /* Barra de progreso del juego */
    .game-progress-wrap {
      background: rgba(255,255,255,.25);
      border-radius: var(--radius-full);
      height: 10px; overflow: hidden;
    }
    .game-progress-bar {
      height: 100%; background: white;
      border-radius: var(--radius-full);
      transition: width .5s cubic-bezier(.16,1,.3,1);
    }
    .game-meta {
      display: flex; justify-content: space-between;
      margin-top: 6px;
    }
    .game-meta span { font-size: .78rem; color: rgba(255,255,255,.85); font-weight: 600; }

    /* ——— ZONA DE JUEGO ——— */
    .game-wrap {
      padding: 24px 20px 48px;
      max-width: 420px; margin: 0 auto;
    }

    /* Tarjeta de pregunta */
    .question-card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      border: 2px solid #FFE0B2;
      position: relative; overflow: hidden;
    }
    .question-card::after {
      content: attr(data-bg);
      position: absolute; right: -10px; bottom: -10px;
      font-size: 5rem; opacity: .08; pointer-events: none;
    }

    .nivel-badge {
      display: inline-block;
      background: #FFF3E0; color: #E65100;
      font-size: .75rem; font-weight: 700;
      padding: 4px 12px; border-radius: var(--radius-full);
      margin-bottom: 16px; border: 1px solid #FFCC80;
    }

    .question-text {
      font-family: var(--font-display);
      font-size: 2.8rem; font-weight: 800;
      color: var(--text); line-height: 1.1;
      margin-bottom: 8px;
    }
    .question-hint {
      font-size: .85rem; color: var(--text-2);
    }

    /* Temporizador visual */
    .timer-ring {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
      position: relative;
    }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-ring circle {
      fill: none; stroke-width: 4;
      stroke-linecap: round;
    }
    .timer-bg  { stroke: #FFE0B2; }
    .timer-fg  { stroke: #FF9800; transition: stroke-dashoffset .9s linear; }
    .timer-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 800; color: #E65100;
    }

    /* Opciones de respuesta */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 18px 12px;
      border-radius: var(--radius-lg);
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 800;
      background: white;
      border: 2.5px solid #E8E6E0;
      color: var(--text);
      cursor: pointer;
      transition: transform .15s, border-color .15s, background .15s;
    }
    .option-btn:hover  { border-color: #FF9800; transform: scale(1.03); }
    .option-btn:active { transform: scale(.96); }

    .option-btn.correct {
      background: #E8F5E9; border-color: #4CAF50; color: #2E7D32;
      animation: bounce .4s cubic-bezier(.16,1,.3,1);
    }
    .option-btn.wrong {
      background: #FFEBEE; border-color: #EF5350; color: #C62828;
      animation: shake .35s ease;
    }
    .option-btn.disabled { pointer-events: none; opacity: .5; }

    @keyframes bounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    /* Feedback rápido */
    .feedback {
      text-align: center; margin-top: 20px;
      font-family: var(--font-display);
      font-size: 1.2rem; font-weight: 800;
      min-height: 32px;
      transition: opacity .2s;
    }
    .feedback.correct { color: #2E7D32; }
    .feedback.wrong   { color: #C62828; }

    /* ——— PANTALLA FINAL ——— */
    .result-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .result-screen.active { display: block; }
    .result-emoji { font-size: 5rem; margin-bottom: 12px; animation: popIn .5s cubic-bezier(.16,1,.3,1); }
    @keyframes popIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-title {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 800; color: var(--text); margin-bottom: 6px;
    }
    .result-sub { font-size: 1rem; color: var(--text-2); margin-bottom: 28px; }
    .result-stars { font-size: 2rem; letter-spacing: 6px; margin-bottom: 8px; }
    .result-pts {
      display: inline-block;
      background: #FFF3E0; color: #E65100;
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 800;
      padding: 10px 28px; border-radius: var(--radius-full);
      border: 2px solid #FFCC80; margin-bottom: 32px;
    }
    .result-btns { display: flex; flex-direction: column; gap: 10px; max-width: 280px; margin: 0 auto; }
    .btn-naranja {
      background: #FF9800; color: white;
      box-shadow: 0 4px 14px rgba(255,152,0,.4);
    }
  </style>
</head>
<body>

  <div id="page-loader">
    <div style="display:flex;gap:8px;">
      <div class="loader-dot" style="background:#FF9800"></div>
      <div class="loader-dot" style="background:#FF9800"></div>
      <div class="loader-dot" style="background:#FF9800"></div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <button class="back-btn" onclick="confirmExit()" aria-label="Volver">←</button>
      <div>
        <p class="hdr-title">Matemáticas 🔢</p>
        <p class="hdr-sub" id="levelLabel">Nivel 1 · Sumas fáciles</p>
      </div>
    </div>
    <div class="game-progress-wrap">
      <div class="game-progress-bar" id="gameProgressBar" style="width:0%"></div>
    </div>
    <div class="game-meta">
      <span id="questionCounter">Pregunta 1 de 10</span>
      <span id="scoreDisplay">⭐ 0 pts</span>
    </div>
  </div>

  <!-- ZONA DE JUEGO -->
  <div class="game-wrap">

    <!-- Pantalla de juego -->
    <div id="gameScreen">
      <div class="question-card" id="questionCard" data-bg="🔢">
        <span class="nivel-badge" id="nivelBadge">Nivel 1</span>

        <!-- Temporizador -->
        <div class="timer-ring">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="timer-bg" cx="28" cy="28" r="24"/>
            <circle class="timer-fg" id="timerCircle" cx="28" cy="28" r="24"
                    stroke-dasharray="150.8" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-num" id="timerNum">10</div>
        </div>

        <p class="question-text" id="questionText">5 + 3 = ?</p>
        <p class="question-hint" id="questionHint">Elige la respuesta correcta</p>
      </div>

      <div class="options-grid" id="optionsGrid"></div>

      <div class="feedback" id="feedback"></div>
    </div>

    <!-- Pantalla de resultado -->
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji">🏆</div>
      <p class="result-title" id="resultTitle">¡Excelente!</p>
      <p class="result-sub"   id="resultSub">Respondiste todas las preguntas</p>
      <div class="result-stars" id="resultStars">⭐⭐⭐</div>
      <div class="result-pts"   id="resultPts">+50 ⭐</div>
      <div class="result-btns">
        <button class="btn btn-naranja btn-xl" onclick="restartGame()">Jugar de nuevo 🔄</button>
        <button class="btn btn-outline btn-xl"  onclick="window.location.href='heladeria.html'">Volver al inicio 🏠</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>

    /* ====================================================
       BANCO DE PREGUNTAS POR NIVEL
    ==================================================== */
    function buildQuestions(level) {
      const qs = [];
      for (let i = 0; i < 10; i++) {
        let q;
        if (level === 1) q = genSuma(1, 10);
        else if (level === 2) q = genSuma(5, 20);
        else if (level === 3) q = genResta(5, 20);
        else q = Math.random() > .5 ? genSuma(10, 50) : genResta(10, 50);
        qs.push(q);
      }
      return qs;
    }

    function genSuma(min, max) {
      const a = rnd(min, max), b = rnd(min, max);
      const correct = a + b;
      return {
        text: `${a} + ${b} = ?`,
        hint: 'Suma los dos números',
        correct,
        options: shuffleOptions(correct, min*2, max*2),
        bg: '➕'
      };
    }

    function genResta(min, max) {
      let a = rnd(min, max), b = rnd(min, max);
      if (b > a) [a, b] = [b, a];
      const correct = a - b;
      return {
        text: `${a} − ${b} = ?`,
        hint: 'Resta el segundo del primero',
        correct,
        options: shuffleOptions(correct, 0, max),
        bg: '➖'
      };
    }

    function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function shuffleOptions(correct, min, max) {
      const opts = new Set([correct]);
      while (opts.size < 4) {
        let fake = correct + rnd(-8, 8);
        if (fake !== correct && fake >= min) opts.add(fake);
      }
      return [...opts].sort(() => Math.random() - .5);
    }

    /* ====================================================
       ESTADO DEL JUEGO
    ==================================================== */
    const LEVELS = [
      { num: 1, label: 'Nivel 1 · Sumas fáciles',   time: 12 },
      { num: 2, label: 'Nivel 2 · Sumas medianas',  time: 10 },
      { num: 3, label: 'Nivel 3 · Restas',          time: 10 },
      { num: 4, label: 'Nivel 4 · Reto mixto',      time: 8  },
    ];

    let state = {};

    function initGame(levelIdx = 0) {
      const lvl = LEVELS[levelIdx];
      state = {
        levelIdx,
        questions:  buildQuestions(lvl.num),
        current:    0,
        score:      0,
        correct:    0,
        answered:   false,
        timerVal:   lvl.time,
        timerInterval: null,
      };
      document.getElementById('levelLabel').textContent = lvl.label;
      document.getElementById('nivelBadge').textContent = `Nivel ${lvl.num}`;
      document.getElementById('gameScreen').style.display  = 'block';
      document.getElementById('resultScreen').classList.remove('active');
      renderQuestion();
    }

    /* ====================================================
       RENDERIZAR PREGUNTA
    ==================================================== */
    function renderQuestion() {
      const { questions, current } = state;
      const q = questions[current];
      const total = questions.length;

      // Progreso
      document.getElementById('gameProgressBar').style.width = (current / total * 100) + '%';
      document.getElementById('questionCounter').textContent  = `Pregunta ${current + 1} de ${total}`;
      document.getElementById('scoreDisplay').textContent     = `⭐ ${state.score} pts`;
      document.getElementById('questionText').textContent     = q.text;
      document.getElementById('questionHint').textContent     = q.hint;
      document.getElementById('questionCard').dataset.bg      = q.bg;
      document.getElementById('feedback').textContent         = '';
      document.getElementById('feedback').className           = 'feedback';

      // Opciones
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => answer(opt, btn);
        grid.appendChild(btn);
      });

      state.answered = false;
      startTimer();
    }

    /* ====================================================
       TEMPORIZADOR
    ==================================================== */
    function startTimer() {
      clearInterval(state.timerInterval);
      const lvl   = LEVELS[state.levelIdx];
      state.timerVal = lvl.time;
      const circ  = document.getElementById('timerCircle');
      const num   = document.getElementById('timerNum');
      const total = 150.8; // 2π × 24

      circ.style.transition = 'none';
      circ.style.strokeDashoffset = 0;
      circ.style.stroke = '#FF9800';
      num.style.color   = '#E65100';

      requestAnimationFrame(() => {
        circ.style.transition = `stroke-dashoffset ${lvl.time}s linear`;
        circ.style.strokeDashoffset = total;
      });

      state.timerInterval = setInterval(() => {
        state.timerVal--;
        num.textContent = state.timerVal;
        if (state.timerVal <= 3) {
          circ.style.stroke = '#EF5350';
          num.style.color   = '#C62828';
        }
        if (state.timerVal <= 0) {
          clearInterval(state.timerInterval);
          if (!state.answered) timeOut();
        }
      }, 1000);
    }

    function timeOut() {
      state.answered = true;
      const correct = state.questions[state.current].correct;
      showFeedback(false, `⏰ Se acabó el tiempo. Era ${correct}`);
      // Marcar la correcta
      document.querySelectorAll('.option-btn').forEach(btn => {
        if (parseInt(btn.textContent) === correct) btn.classList.add('correct');
        else btn.classList.add('disabled');
      });
      setTimeout(nextQuestion, 1800);
    }

    /* ====================================================
       RESPONDER
    ==================================================== */
    function answer(value, btn) {
      if (state.answered) return;
      state.answered = true;
      clearInterval(state.timerInterval);

      const correct = state.questions[state.current].correct;
      const isOk    = value === correct;

      // Bonus por tiempo restante
      const bonus = isOk ? Math.max(0, state.timerVal) * 2 : 0;
      const pts   = isOk ? 10 + bonus : 0;

      document.querySelectorAll('.option-btn').forEach(b => {
        b.classList.add('disabled');
        if (parseInt(b.textContent) === correct) b.classList.add('correct');
      });

      if (!isOk) btn.classList.add('wrong');

      if (isOk) {
        state.score   += pts;
        state.correct++;
        showFeedback(true, `¡Correcto! +${pts} ⭐`);
      } else {
        showFeedback(false, `La respuesta era ${correct} 😅`);
      }

      document.getElementById('scoreDisplay').textContent = `⭐ ${state.score} pts`;
      setTimeout(nextQuestion, 1600);
    }

    function showFeedback(ok, msg) {
      const el = document.getElementById('feedback');
      el.textContent  = msg;
      el.className    = `feedback ${ok ? 'correct' : 'wrong'}`;
    }

    /* ====================================================
       SIGUIENTE PREGUNTA / FIN
    ==================================================== */
    function nextQuestion() {
      state.current++;
      if (state.current < state.questions.length) {
        renderQuestion();
      } else {
        endGame();
      }
    }

    async function endGame() {
      clearInterval(state.timerInterval);
      document.getElementById('gameProgressBar').style.width = '100%';

      const pct  = state.correct / state.questions.length;
      let emoji, title, sub;

      if (pct >= .9)      { emoji = '🏆'; title = '¡Increíble!';   sub = '¡Eres un genio de las matemáticas!'; }
      else if (pct >= .7) { emoji = '🌟'; title = '¡Muy bien!';    sub = `Respondiste ${state.correct} de ${state.questions.length} correctas.`; }
      else if (pct >= .5) { emoji = '👍'; title = '¡Buen intento!'; sub = 'Sigue practicando, ya casi lo logras.'; }
      else                { emoji = '💪'; title = '¡Tú puedes!';   sub = 'Practica un poco más y lo lograrás.'; }

      const stars = pct >= .9 ? '⭐⭐⭐' : pct >= .7 ? '⭐⭐' : '⭐';

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultSub').textContent   = sub;
      document.getElementById('resultStars').textContent = stars;
      document.getElementById('resultPts').textContent   = `+${state.score} ⭐`;

      document.getElementById('gameScreen').style.display = 'none';
      document.getElementById('resultScreen').classList.add('active');

      // Guardar en Supabase
      const kid = getKidSession();
      if (kid && state.score > 0) {
        await sb.from('activity_log').insert({
          student_id: kid.id,
          module:     'matematica',
          activity:   `Nivel ${LEVELS[state.levelIdx].num}`,
          score:      state.score,
          completed:  pct >= .5,
        });

        // Actualizar puntos del estudiante
        await sb.from('students')
          .update({ points: (kid.points || 0) + state.score })
          .eq('id', kid.id);

        kid.points = (kid.points || 0) + state.score;
        saveKidSession(kid);
      }
    }

    function restartGame() {
      initGame(state.levelIdx);
    }

    function confirmExit() {
      if (state.current > 0) {
        if (!confirm('¿Seguro que quieres salir? Perderás el progreso de esta ronda.')) return;
      }
      clearInterval(state.timerInterval);
      window.location.href = 'heladeria.html';
    }

    /* ====================================================
       ARRANQUE
    ==================================================== */
    (async () => {
      const kid = getKidSession();
      if (!kid) { window.location.href = '../index.html'; return; }
      hideLoader();
      initGame(0);
    })();
  </script>
</body>
</html>
