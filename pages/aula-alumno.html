<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <meta name="theme-color" content="#0EB882">
  <title>Mi Aula · Mundo del Saber</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { background: var(--bg); }

    /* ── HEADER ── */
    .hdr { padding: 20px 20px 16px; position: relative; overflow: hidden; }
    .hdr::after { content: '🏫'; position: absolute; right: -8px; top: -10px; font-size: 6rem; opacity: .12; pointer-events: none; }
    .hdr-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .back-btn { width: 38px; height: 38px; border-radius: 12px; background: rgba(255,255,255,.25); border: none; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hdr-name    { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; color: white; line-height: 1.1; }
    .hdr-subject { font-size: .82rem; color: rgba(255,255,255,.8); margin-top: 2px; }
    .hdr-code    { background: rgba(255,255,255,.2); border-radius: var(--radius-full); padding: 5px 14px; font-size: .8rem; font-weight: 700; color: white; display: inline-block; letter-spacing: 1px; }

    /* ── TABS ── */
    .tabs-bar { display: flex; background: white; border-bottom: 2px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 0; z-index: 50; }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 12px 16px; font-size: .82rem; font-weight: 700; color: var(--text-2); white-space: nowrap; flex-shrink: 0; border-bottom: 3px solid transparent; margin-bottom: -2px; cursor: pointer; transition: color .15s, border-color .15s; }
    .tab-btn.active { border-bottom-color: var(--tab-color, #0EB882); color: var(--text); }

    .view { display: none; }
    .view.active { display: block; }
    .content { padding: 16px 16px 90px; max-width: 480px; margin: 0 auto; }

    /* ── ITEMS GENÉRICOS ── */
    .item-card { background: white; border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
    .item-title { font-family: var(--font-display); font-size: .95rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .item-meta  { font-size: .72rem; color: var(--text-3); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .item-body  { font-size: .88rem; color: var(--text-2); line-height: 1.55; }
    .pinned-card { border-color: var(--tab-color, #0EB882); }
    .pinned-strip { display: inline-block; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-full); color: white; margin-bottom: 6px; }

    /* ── TAREA CARD ── */
    .tarea-card { background: white; border-radius: var(--radius-xl); padding: 16px; margin-bottom: 12px; border: 2px solid var(--border); cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .tarea-card:hover  { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .tarea-card:active { transform: scale(.98); }
    .tarea-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .tarea-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .tarea-title { font-family: var(--font-display); font-size: .95rem; font-weight: 800; color: var(--text); flex: 1; }
    .tarea-desc  { font-size: .82rem; color: var(--text-2); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tarea-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tarea-badge { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-full); }
    .badge-pending  { background: #FFF3E0; color: #E65100; }
    .badge-submitted{ background: #E3F2FD; color: #1565C0; }
    .badge-graded   { background: #E8F5E9; color: #2E7D32; }
    .badge-late     { background: #FFEBEE; color: #C62828; }

    /* ── MODAL ENTREGA ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: opacity .25s, visibility .25s; }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal-sheet { background: white; border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 24px 20px calc(36px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; transform: translateY(100%); transition: transform .35s cubic-bezier(.16,1,.3,1); max-height: 92dvh; overflow-y: auto; }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: var(--radius-full); margin: 0 auto 20px; }
    .modal-title  { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .modal-sub    { font-size: .85rem; color: var(--text-2); margin-bottom: 16px; }
    .modal-desc   { background: var(--bg); border-radius: var(--radius-md); padding: 12px 14px; font-size: .88rem; color: var(--text-2); line-height: 1.5; margin-bottom: 16px; }
    .modal-meta   { font-size: .8rem; color: var(--text-3); margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .modal-meta span { display: flex; align-items: center; gap: 4px; }

    .tab-pills { display: flex; gap: 6px; margin-bottom: 14px; }
    .pill { padding: 6px 14px; border-radius: var(--radius-full); font-size: .8rem; font-weight: 700; background: var(--bg); border: 1.5px solid var(--border); color: var(--text-2); cursor: pointer; transition: background .15s, color .15s; }
    .pill.active { background: var(--heladeria); color: white; border-color: var(--heladeria); }

    .entrega-view { display: none; }
    .entrega-view.active { display: block; }

    .already-submitted { background: #E8F5E9; border: 1.5px solid #A5D6A7; border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 16px; }
    .already-submitted .ast-title { font-weight: 700; color: #2E7D32; margin-bottom: 4px; font-size: .9rem; }
    .already-submitted .ast-body  { font-size: .85rem; color: #388E3C; }
    .grade-display { background: var(--heladeria-light); border: 1.5px solid var(--heladeria-soft); border-radius: var(--radius-lg); padding: 14px 16px; text-align: center; margin-bottom: 12px; }
    .grade-num { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: var(--heladeria-dark); }
    .grade-max { font-size: .85rem; color: var(--text-2); }

    /* ── MATERIAL ── */
    .mat-card { background: white; border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
    .mat-title { font-family: var(--font-display); font-size: .95rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .mat-body  { font-size: .85rem; color: var(--text-2); line-height: 1.5; margin-bottom: 8px; }
    .mat-link  { display: inline-flex; align-items: center; gap: 6px; background: var(--heladeria-light); color: var(--heladeria-dark); border: 1.5px solid var(--heladeria-soft); border-radius: var(--radius-full); padding: 6px 14px; font-size: .82rem; font-weight: 700; text-decoration: none; transition: background .15s; }
    .mat-link:hover { background: var(--heladeria-soft); }

    /* ── BOTTOM NAV ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1.5px solid var(--border); display: flex; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 100; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; font-size: .65rem; font-weight: 700; color: var(--text-3); cursor: pointer; }
    .nav-btn .nav-ico { font-size: 1.4rem; }
    .nav-btn.active { color: var(--heladeria-dark); }

    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-3); }
    .empty-state .ico { font-size: 2.5rem; margin-bottom: 8px; }
    .empty-state p { font-size: .9rem; }

    .btn-green { background: var(--heladeria); color: white; box-shadow: 0 4px 14px rgba(14,184,130,.35); }
  </style>
</head>
<body>

  <div id="page-loader">
    <div style="display:flex;gap:8px;">
      <div class="loader-dot" style="background:var(--heladeria)"></div>
      <div class="loader-dot" style="background:var(--heladeria)"></div>
      <div class="loader-dot" style="background:var(--heladeria)"></div>
    </div>
  </div>

  <!-- HEADER dinámico -->
  <div class="hdr" id="aulaHdr">
    <div class="hdr-top">
      <button class="back-btn" onclick="window.location.href='heladeria.html'" style="background:rgba(255,255,255,.2)">←</button>
      <div style="flex:1">
        <p class="hdr-name"    id="aulaName">Cargando...</p>
        <p class="hdr-subject" id="aulaSubject"></p>
      </div>
    </div>
    <span class="hdr-code" id="aulaCode"></span>
  </div>

  <!-- TABS -->
  <div class="tabs-bar" id="tabsBar">
    <button class="tab-btn active" onclick="switchTab('avisos',this)">📢 Avisos</button>
    <button class="tab-btn"        onclick="switchTab('tareas',this)">📝 Tareas</button>
    <button class="tab-btn"        onclick="switchTab('material',this)">📁 Material</button>
  </div>

  <!-- AVISOS -->
  <div class="view active content" id="viewAvisos">
    <div id="avisosList"></div>
  </div>

  <!-- TAREAS -->
  <div class="view content" id="viewTareas">
    <div id="tareasList"></div>
  </div>

  <!-- MATERIAL -->
  <div class="view content" id="viewMaterial">
    <div id="materialList"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='heladeria.html'">
      <span class="nav-ico">🏠</span><span>Inicio</span>
    </button>
    <button class="nav-btn active">
      <span class="nav-ico">🏫</span><span>Mi Aula</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='creativo.html'">
      <span class="nav-ico">✏️</span><span>Crear</span>
    </button>
  </nav>

  <!-- MODAL: Ver tarea y entregar -->
  <div class="modal-overlay" id="tareaModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>

      <p class="modal-title" id="mTitle">Título de la tarea</p>
      <div class="modal-meta" id="mMeta"></div>
      <div class="modal-desc" id="mDesc">Descripción de la tarea</div>

      <!-- Si ya entregó / calificado -->
      <div id="mAlreadySubmitted" style="display:none"></div>

      <!-- Si no ha entregado y no está vencida -->
      <div id="mEntregaForm" style="display:none">
        <div class="tab-pills">
          <button class="pill active" onclick="switchEntregaPill('texto',this)">📝 Texto</button>
          <button class="pill"        onclick="switchEntregaPill('link',this)">🔗 Link</button>
        </div>
        <div class="entrega-view active" id="entregaTexto">
          <div class="field-group">
            <label class="field-label">Tu respuesta</label>
            <textarea class="field-input" id="entregaContent" rows="5"
                      placeholder="Escribe tu respuesta aquí..." maxlength="1000"
                      style="resize:none"></textarea>
          </div>
        </div>
        <div class="entrega-view" id="entregaLink">
          <div class="field-group">
            <label class="field-label">Link de tu trabajo</label>
            <input class="field-input" id="entregaUrl" type="url"
                   placeholder="https://drive.google.com/... o cualquier link">
            <p style="font-size:.75rem;color:var(--text-3);margin-top:4px">
              Puedes usar Google Drive, OneDrive, Dropbox, etc.
            </p>
          </div>
        </div>
        <button class="btn btn-green btn-xl" id="btnEntregar" onclick="submitTarea()">
          Entregar tarea ✅
        </button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>

    /* ══════════════════════════════════════════
       ESTADO
    ══════════════════════════════════════════ */
    let kid        = null;
    let classroom  = null;
    let activeTarea = null;   // tarea abierta en el modal
    let entregaPill = 'texto';

    /* ══════════════════════════════════════════
       INIT — leer classroom_id de URL
    ══════════════════════════════════════════ */
    async function init() {
      kid = getKidSession();
      if (!kid) { window.location.href = '../index.html'; return; }

      const params = new URLSearchParams(location.search);
      const classId = params.get('id');
      if (!classId) { window.location.href = 'heladeria.html'; return; }

      const { data: cls } = await sb.from('classrooms').select('*').eq('id', classId).single();
      if (!cls) { window.location.href = 'heladeria.html'; return; }
      classroom = cls;

      // Aplicar color del aula
      const hdr = document.getElementById('aulaHdr');
      hdr.style.background = `linear-gradient(135deg, ${cls.color}cc, ${cls.color})`;
      document.querySelectorAll('.tab-btn.active').forEach(t => {
        t.style.setProperty('--tab-color', cls.color);
      });
      document.documentElement.style.setProperty('--tab-color', cls.color);

      document.getElementById('aulaName').textContent    = cls.name;
      document.getElementById('aulaSubject').textContent = cls.subject || '';
      document.getElementById('aulaCode').textContent    = `🔑 ${cls.code}`;

      // Color al tab activo
      document.querySelector('.tab-btn.active').style.borderBottomColor = cls.color;

      await loadAvisos();
      hideLoader();
    }

    /* ══════════════════════════════════════════
       TABS
    ══════════════════════════════════════════ */
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        b.style.borderBottomColor = '';
        b.style.color = '';
      });
      btn.classList.add('active');
      btn.style.borderBottomColor = classroom?.color || 'var(--heladeria)';

      ['Avisos','Tareas','Material'].forEach(t => {
        document.getElementById(`view${t}`)?.classList.remove('active');
      });
      document.getElementById(`view${tab.charAt(0).toUpperCase()+tab.slice(1)}`)?.classList.add('active');

      const map = { avisos: loadAvisos, tareas: loadTareas, material: loadMaterial };
      map[tab]?.();
    }

    /* ══════════════════════════════════════════
       AVISOS
    ══════════════════════════════════════════ */
    async function loadAvisos() {
      const list = document.getElementById('avisosList');
      list.innerHTML = empty('⏳','Cargando avisos...','');

      const { data } = await sb.from('announcements')
        .select('*')
        .eq('classroom_id', classroom.id)
        .order('pinned', { ascending: false })
        .order('created_at', { ascending: false });

      if (!data || data.length === 0) {
        list.innerHTML = empty('📢', 'Sin avisos aún', 'Aquí aparecerán los avisos de tu profesor.');
        return;
      }

      list.innerHTML = '';
      data.forEach(a => {
        const card = document.createElement('div');
        card.className = 'item-card' + (a.pinned ? ' pinned-card' : '');
        card.innerHTML = `
          ${a.pinned ? `<span class="pinned-strip" style="background:${classroom.color}">📌 Fijado</span>` : ''}
          <p class="item-title">${esc(a.title)}</p>
          <p class="item-meta">${fmt(a.created_at)}</p>
          <p class="item-body">${esc(a.content)}</p>`;
        list.appendChild(card);
      });
    }

    /* ══════════════════════════════════════════
       TAREAS
    ══════════════════════════════════════════ */
    async function loadTareas() {
      const list = document.getElementById('tareasList');
      list.innerHTML = empty('⏳','Cargando tareas...','');

      const { data: tasks } = await sb.from('assignments')
        .select('*')
        .eq('classroom_id', classroom.id)
        .order('created_at', { ascending: false });

      if (!tasks || tasks.length === 0) {
        list.innerHTML = empty('📝', 'Sin tareas asignadas', 'Tu profesor aún no ha asignado tareas.');
        return;
      }

      // Cargar entregas del alumno
      const taskIds = tasks.map(t => t.id);
      const { data: subs } = await sb.from('submissions')
        .select('*')
        .eq('student_id', kid.id)
        .in('assignment_id', taskIds);

      const subMap = {};
      subs?.forEach(s => { subMap[s.assignment_id] = s; });

      list.innerHTML = '';
      tasks.forEach(t => {
        const sub     = subMap[t.id];
        const isPast  = t.due_date && new Date(t.due_date) < new Date();
        const status  = sub?.status || (isPast ? 'late' : 'pending');

        const badgeMap = {
          pending:   { cls:'badge-pending',   icon:'📅', label:'Pendiente' },
          late:      { cls:'badge-late',      icon:'⏰', label:'Vencida' },
          submitted: { cls:'badge-submitted', icon:'📬', label:'Entregada' },
          graded:    { cls:'badge-graded',    icon:'✅', label:`Calificada: ${sub?.score}/${t.max_score}` },
        };
        const badge = badgeMap[status] || badgeMap.pending;

        const card = document.createElement('div');
        card.className = 'tarea-card';
        card.innerHTML = `
          <div class="tarea-header">
            <div class="tarea-icon" style="background:${classroom.color}22">📝</div>
            <p class="tarea-title">${esc(t.title)}</p>
          </div>
          <p class="tarea-desc">${esc(t.description)}</p>
          <div class="tarea-footer">
            <span class="tarea-badge ${badge.cls}">${badge.icon} ${badge.label}</span>
            ${t.due_date ? `<span style="font-size:.72rem;color:var(--text-3)">Límite: ${fmt(t.due_date)}</span>` : ''}
          </div>`;
        card.onclick = () => openTareaModal(t, sub);
        list.appendChild(card);
      });
    }

    /* ══════════════════════════════════════════
       MATERIAL
    ══════════════════════════════════════════ */
    async function loadMaterial() {
      const list = document.getElementById('materialList');
      list.innerHTML = empty('⏳','Cargando material...','');

      const { data } = await sb.from('materials')
        .select('*')
        .eq('classroom_id', classroom.id)
        .order('created_at', { ascending: false });

      if (!data || data.length === 0) {
        list.innerHTML = empty('📁', 'Sin material publicado', 'Tu profesor aún no ha subido material.');
        return;
      }

      list.innerHTML = '';
      data.forEach(m => {
        const card = document.createElement('div');
        card.className = 'mat-card';
        card.innerHTML = `
          <p class="mat-title">${esc(m.title)}</p>
          ${m.description ? `<p style="font-size:.75rem;color:var(--text-3);margin-bottom:6px">${esc(m.description)}</p>` : ''}
          ${m.content     ? `<p class="mat-body">${esc(m.content)}</p>` : ''}
          ${m.link_url    ? `<a class="mat-link" href="${m.link_url}" target="_blank" rel="noopener">🔗 Abrir recurso</a>` : ''}
          <p style="font-size:.7rem;color:var(--text-3);margin-top:8px">${fmt(m.created_at)}</p>`;
        list.appendChild(card);
      });
    }

    /* ══════════════════════════════════════════
       MODAL DE TAREA
    ══════════════════════════════════════════ */
    function openTareaModal(task, sub) {
      activeTarea = task;
      document.getElementById('mTitle').textContent = task.title;
      document.getElementById('mDesc').textContent  = task.description;

      // Meta info
      const metaEl = document.getElementById('mMeta');
      metaEl.innerHTML = '';
      if (task.due_date) {
        const isPast = new Date(task.due_date) < new Date();
        metaEl.innerHTML += `<span style="color:${isPast?'#C62828':'var(--text-3)'}">📅 ${isPast?'Venció: ':'Límite: '}${fmt(task.due_date)}</span>`;
      }
      metaEl.innerHTML += `<span>🏆 Puntaje: ${task.max_score} pts</span>`;

      const formEl    = document.getElementById('mEntregaForm');
      const alreadyEl = document.getElementById('mAlreadySubmitted');

      // Limpiar
      formEl.style.display    = 'none';
      alreadyEl.style.display = 'none';
      alreadyEl.innerHTML     = '';

      if (sub?.status === 'graded') {
        // Mostrar calificación
        alreadyEl.style.display = 'block';
        alreadyEl.innerHTML = `
          <div class="grade-display">
            <p style="font-size:.8rem;color:var(--text-2);margin-bottom:4px">Tu calificación</p>
            <p class="grade-num">${sub.score}</p>
            <p class="grade-max">de ${task.max_score} puntos</p>
            ${sub.feedback ? `<p style="font-size:.85rem;color:var(--text-2);margin-top:8px;font-style:italic">"${esc(sub.feedback)}"</p>` : ''}
          </div>
          <div class="already-submitted">
            <p class="ast-title">✅ Tarea entregada y calificada</p>
            <p class="ast-body">${sub.content ? esc(sub.content) : ''}${sub.link_url ? `🔗 ${sub.link_url}` : ''}</p>
          </div>`;
      } else if (sub?.status === 'submitted') {
        // Ya entregó, esperando calificación
        alreadyEl.style.display = 'block';
        alreadyEl.innerHTML = `
          <div class="already-submitted">
            <p class="ast-title">📬 Tarea entregada — esperando calificación</p>
            <p class="ast-body">${sub.content ? esc(sub.content) : ''}${sub.link_url ? `🔗 <a href="${sub.link_url}" target="_blank" style="color:var(--heladeria-dark)">${sub.link_url}</a>` : ''}</p>
          </div>`;
      } else {
        // No entregada — mostrar formulario (a menos que esté vencida)
        const isPast = task.due_date && new Date(task.due_date) < new Date();
        if (isPast) {
          alreadyEl.style.display = 'block';
          alreadyEl.innerHTML = `<div style="background:#FFEBEE;border:1.5px solid #FFCDD2;border-radius:var(--radius-md);padding:14px;text-align:center"><p style="font-size:1.3rem">⏰</p><p style="font-weight:700;color:#C62828;margin-top:4px">Esta tarea ya venció</p><p style="font-size:.82rem;color:#C62828">La fecha límite ya pasó</p></div>`;
        } else {
          formEl.style.display = 'block';
          document.getElementById('entregaContent').value = '';
          document.getElementById('entregaUrl').value     = '';
          switchEntregaPill('texto', document.querySelector('.pill'));
        }
      }

      document.getElementById('tareaModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('tareaModal').classList.remove('open');
      activeTarea = null;
    }

    function switchEntregaPill(pill, btn) {
      entregaPill = pill;
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn?.classList.add('active');
      document.getElementById('entregaTexto').classList.toggle('active', pill === 'texto');
      document.getElementById('entregaLink').classList.toggle('active', pill === 'link');
    }

    /* ══════════════════════════════════════════
       ENTREGAR TAREA
    ══════════════════════════════════════════ */
    async function submitTarea() {
      if (!activeTarea) return;

      const content = document.getElementById('entregaContent').value.trim();
      const url     = document.getElementById('entregaUrl').value.trim();

      if (entregaPill === 'texto' && !content) {
        showToast('Escribe tu respuesta antes de entregar', 'error'); return;
      }
      if (entregaPill === 'link' && !url) {
        showToast('Pega el link de tu trabajo', 'error'); return;
      }

      const btn = document.getElementById('btnEntregar');
      setButtonLoading(btn, true);

      const { error } = await sb.from('submissions').upsert({
        assignment_id: activeTarea.id,
        student_id:    kid.id,
        content:       entregaPill === 'texto' ? content : null,
        link_url:      entregaPill === 'link'  ? url     : null,
        status:        'submitted',
        submitted_at:  new Date().toISOString(),
      }, { onConflict: 'assignment_id,student_id' });

      setButtonLoading(btn, false);

      if (error) { showToast('Error al entregar. Intenta de nuevo.', 'error'); return; }

      // Puntos por entregar (+5)
      await sb.from('students').update({ points: (kid.points||0) + 5 }).eq('id', kid.id);
      kid.points = (kid.points||0) + 5;
      saveKidSession(kid);

      showToast('¡Tarea entregada! 🎉 +5 ⭐', 'success');
      closeModal();
      loadTareas();
    }

    /* ══════════════════════════════════════════
       UTILIDADES
    ══════════════════════════════════════════ */
    function empty(ico, title, sub) {
      return `<div class="empty-state"><div class="ico">${ico}</div><p style="font-weight:700;color:var(--text);font-size:.95rem">${title}</p><p style="margin-top:4px;font-size:.82rem">${sub}</p></div>`;
    }
    function fmt(d) { return new Date(d).toLocaleDateString('es',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    init();
  </script>
</body>
</html>
