<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <meta name="theme-color" content="#7B68EE">
  <title>Panel Docente · Mundo del Saber</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { background: var(--creativo-light); }
    .hdr { background: linear-gradient(135deg, var(--creativo-dark), var(--creativo)); padding: 20px 20px 16px; position: relative; overflow: hidden; }
    .hdr::before { content:'📚'; position:absolute; right:-8px; top:-10px; font-size:6rem; opacity:.12; pointer-events:none; }
    .hdr-top { display:flex; align-items:center; justify-content:space-between; }
    .hdr-title { font-family:var(--font-display); font-size:1.2rem; font-weight:800; color:white; }
    .hdr-sub   { font-size:.8rem; color:rgba(255,255,255,.75); margin-top:2px; }
    .logout-btn { background:rgba(255,255,255,.2); border:none; color:white; border-radius:10px; padding:7px 14px; font-size:.8rem; font-weight:700; cursor:pointer; }
    .tabs-bar { display:flex; background:white; border-bottom:2px solid var(--border); overflow-x:auto; scrollbar-width:none; position:sticky; top:0; z-index:50; }
    .tabs-bar::-webkit-scrollbar { display:none; }
    .tab-btn { padding:13px 18px; font-size:.85rem; font-weight:700; color:var(--text-2); white-space:nowrap; flex-shrink:0; border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .15s, border-color .15s; cursor:pointer; }
    .tab-btn.active { color:var(--creativo-dark); border-bottom-color:var(--creativo); }
    .view { display:none; }
    .view.active { display:block; }
    .content { padding:20px 16px 90px; max-width:520px; margin:0 auto; }
    .section-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--creativo-dark); margin-bottom:12px; }
    /* AULAS */
    .classrooms-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .classroom-card { border-radius:var(--radius-xl); padding:18px 16px; cursor:pointer; border:2px solid transparent; transition:transform .2s, box-shadow .2s; position:relative; overflow:hidden; text-align:left; min-height:110px; display:flex; flex-direction:column; justify-content:space-between; }
    .classroom-card::after { content:'🏫'; position:absolute; right:-6px; bottom:-8px; font-size:3rem; opacity:.15; pointer-events:none; }
    .classroom-card:hover  { transform:translateY(-3px); box-shadow:var(--shadow-lg); }
    .classroom-card:active { transform:scale(.97); }
    .cc-subject { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; opacity:.8; margin-bottom:6px; }
    .cc-name    { font-family:var(--font-display); font-size:1rem; font-weight:800; line-height:1.2; }
    .cc-code    { font-size:.72rem; font-weight:700; margin-top:8px; opacity:.75; letter-spacing:1px; }
    .add-classroom-card { border-radius:var(--radius-xl); padding:18px 16px; border:2.5px dashed var(--creativo-soft); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; min-height:110px; transition:background .15s; background:white; }
    .add-classroom-card:hover { background:var(--creativo-light); }
    .add-classroom-card .ico { font-size:1.8rem; }
    .add-classroom-card p { font-size:.82rem; font-weight:700; color:var(--creativo-dark); text-align:center; }
    /* VISTA INTERIOR AULA */
    .classroom-view { display:none; }
    .classroom-view.active { display:block; }
    .aula-header { border-radius:var(--radius-xl); padding:20px; margin-bottom:16px; position:relative; overflow:hidden; color:white; }
    .aula-header::after { content:'🏫'; position:absolute; right:-8px; bottom:-12px; font-size:5rem; opacity:.15; }
    .aula-back { background:rgba(255,255,255,.25); border:none; color:white; border-radius:10px; padding:6px 12px; font-size:.82rem; font-weight:700; cursor:pointer; margin-bottom:12px; display:inline-block; }
    .aula-name    { font-family:var(--font-display); font-size:1.4rem; font-weight:800; }
    .aula-subject { font-size:.85rem; opacity:.85; margin-top:2px; }
    .aula-code-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .aula-code { background:rgba(255,255,255,.25); border-radius:var(--radius-md); padding:5px 14px; font-family:monospace; font-size:1rem; font-weight:800; letter-spacing:2px; cursor:pointer; }
    .aula-code-hint { font-size:.75rem; opacity:.8; }
    .aula-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; scrollbar-width:none; }
    .aula-tabs::-webkit-scrollbar { display:none; }
    .aula-tab { padding:7px 14px; border-radius:var(--radius-full); font-size:.8rem; font-weight:700; color:var(--text-2); background:white; border:1.5px solid var(--border); white-space:nowrap; flex-shrink:0; cursor:pointer; transition:background .15s, color .15s, border-color .15s; }
    .aula-tab.active { color:white; border-color:transparent; }
    .aula-view { display:none; }
    .aula-view.active { display:block; }
    /* ITEMS */
    .item-card { background:white; border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:10px; border:1.5px solid var(--border); box-shadow:var(--shadow-sm); }
    .item-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px; }
    .item-title { font-family:var(--font-display); font-size:.95rem; font-weight:800; color:var(--text); }
    .item-date  { font-size:.72rem; color:var(--text-3); white-space:nowrap; flex-shrink:0; }
    .item-body  { font-size:.85rem; color:var(--text-2); line-height:1.5; margin-bottom:8px; }
    .item-link  { display:inline-flex; align-items:center; gap:4px; font-size:.82rem; font-weight:700; color:var(--creativo-dark); text-decoration:none; }
    .item-footer { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .item-badge { font-size:.7rem; font-weight:700; padding:3px 10px; border-radius:var(--radius-full); }
    .badge-pending { background:#FFF3E0; color:#E65100; }
    .badge-due     { background:#FFEBEE; color:#C62828; }
    .badge-graded  { background:#E8F5E9; color:#2E7D32; }
    .badge-pinned  { background:var(--creativo-light); color:var(--creativo-dark); }
    .delete-btn { background:none; border:none; color:var(--text-3); cursor:pointer; font-size:.85rem; padding:2px 6px; border-radius:6px; transition:background .15s; margin-left:auto; }
    .delete-btn:hover { background:#FFEBEE; color:#C62828; }
    /* ENTREGAS */
    .submission-item { background:white; border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:10px; border:1.5px solid var(--border); display:flex; flex-direction:column; gap:8px; }
    .sub-header { display:flex; align-items:center; gap:10px; }
    .sub-avatar { font-size:1.3rem; }
    .sub-student { font-size:.9rem; font-weight:700; color:var(--text); flex:1; }
    .sub-status { font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:var(--radius-full); }
    .sub-content { font-size:.85rem; color:var(--text-2); background:var(--bg); padding:10px 12px; border-radius:var(--radius-md); line-height:1.5; }
    .grade-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .grade-input { width:70px; padding:8px 10px; border-radius:var(--radius-md); border:2px solid var(--border); font-size:.95rem; font-weight:700; text-align:center; font-family:var(--font-display); }
    .grade-input:focus { border-color:var(--creativo); outline:none; }
    .feedback-input { flex:1; min-width:120px; padding:8px 12px; border-radius:var(--radius-md); border:2px solid var(--border); font-size:.85rem; font-family:var(--font-body); color:var(--text); }
    .feedback-input:focus { border-color:var(--creativo); outline:none; }
    .grade-btn { padding:8px 16px; border-radius:var(--radius-full); background:var(--creativo); color:white; border:none; font-size:.82rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    /* NAV */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1.5px solid var(--border); display:flex; padding:10px 0 calc(10px + env(safe-area-inset-bottom)); z-index:100; }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 4px; font-size:.65rem; font-weight:700; color:var(--text-3); cursor:pointer; }
    .nav-btn .nav-ico { font-size:1.4rem; }
    .nav-btn.active { color:var(--creativo-dark); }
    .fab { position:fixed; bottom:calc(70px + env(safe-area-inset-bottom)); right:20px; width:54px; height:54px; border-radius:50%; background:var(--creativo); color:white; border:none; font-size:1.5rem; cursor:pointer; z-index:60; box-shadow:0 6px 20px rgba(123,104,238,.45); display:flex; align-items:center; justify-content:center; transition:transform .15s; }
    .fab:hover  { transform:scale(1.08); }
    .fab:active { transform:scale(.95); }
    .fab.hidden { display:none; }
    /* MODALES */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; visibility:hidden; transition:opacity .25s, visibility .25s; }
    .modal-overlay.open { opacity:1; visibility:visible; }
    .modal-sheet { background:white; border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:24px 20px calc(36px + env(safe-area-inset-bottom)); width:100%; max-width:520px; transform:translateY(100%); transition:transform .35s cubic-bezier(.16,1,.3,1); max-height:90dvh; overflow-y:auto; }
    .modal-overlay.open .modal-sheet { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:var(--radius-full); margin:0 auto 20px; }
    .modal-title  { font-family:var(--font-display); font-size:1.25rem; font-weight:800; margin-bottom:16px; color:var(--text); }
    .color-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .color-dot { width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:transform .1s; }
    .color-dot:hover { transform:scale(1.1); }
    .color-dot.sel   { border-color:var(--text); transform:scale(1.15); }
    .btn-purple { background:var(--creativo); color:white; box-shadow:0 4px 14px rgba(123,104,238,.4); }
    .empty-state { text-align:center; padding:40px 20px; color:var(--text-3); }
    .empty-state .ico { font-size:2.5rem; margin-bottom:8px; }
    .empty-state p { font-size:.9rem; }
  </style>
</head>
<body>
  <div id="page-loader">
    <div style="display:flex;gap:8px;">
      <div class="loader-dot" style="background:var(--creativo)"></div>
      <div class="loader-dot" style="background:var(--creativo)"></div>
      <div class="loader-dot" style="background:var(--creativo)"></div>
    </div>
  </div>

  <div class="hdr">
    <div class="hdr-top">
      <div>
        <p class="hdr-title" id="hdrTitle">Panel Docente</p>
        <p class="hdr-sub"   id="hdrSub">Cargando...</p>
      </div>
      <button class="logout-btn" onclick="logout()">Salir →</button>
    </div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchMainTab('aulas',this)">🏫 Mis Aulas</button>
    <button class="tab-btn"        onclick="switchMainTab('mod',this)">✅ Moderación</button>
    <button class="tab-btn"        onclick="switchMainTab('foro',this)">💬 Comunidad</button>
  </div>

  <!-- MIS AULAS -->
  <div class="view active content" id="viewAulas">
    <p class="section-title">🏫 Mis aulas</p>
    <div class="classrooms-grid" id="classroomsGrid"></div>
  </div>

  <!-- INTERIOR AULA -->
  <div class="classroom-view content" id="classroomView">
    <div class="aula-header" id="aulaHeader">
      <button class="aula-back" onclick="backToAulas()">← Mis aulas</button>
      <p class="aula-name"    id="aulaName">Aula</p>
      <p class="aula-subject" id="aulaSubject">Materia</p>
      <div class="aula-code-row">
        <span class="aula-code" id="aulaCode" onclick="copyCode()">XXXXX</span>
        <span class="aula-code-hint">Toca para copiar</span>
      </div>
    </div>
    <div class="aula-tabs">
      <button class="aula-tab active" onclick="switchAulaTab('avisos',this)">📢 Avisos</button>
      <button class="aula-tab"        onclick="switchAulaTab('tareas',this)">📝 Tareas</button>
      <button class="aula-tab"        onclick="switchAulaTab('material',this)">📁 Material</button>
      <button class="aula-tab"        onclick="switchAulaTab('entregas',this)">📬 Entregas</button>
      <button class="aula-tab"        onclick="switchAulaTab('alumnos',this)">👥 Alumnos</button>
    </div>
    <div class="aula-view active" id="aulaAvisos"><div id="avisosList"></div></div>
    <div class="aula-view"        id="aulaTareas"><div id="tareasList"></div></div>
    <div class="aula-view"        id="aulaMaterial"><div id="materialList"></div></div>
    <div class="aula-view"        id="aulaEntregas"><div id="entregasList"></div></div>
    <div class="aula-view"        id="aulaAlumnos"><div id="alumnosList"></div></div>
  </div>

  <!-- MODERACIÓN -->
  <div class="view content" id="viewMod">
    <p class="section-title">📋 Publicaciones pendientes</p>
    <div id="modList"><div class="empty-state"><div class="ico">⏳</div><p>Cargando...</p></div></div>
  </div>

  <!-- COMUNIDAD -->
  <div class="view content" id="viewForo">
    <div style="background:white;border-radius:var(--radius-xl);padding:24px;text-align:center;border:1.5px solid var(--border)">
      <p style="font-size:2rem;margin-bottom:10px">💬</p>
      <p style="font-family:var(--font-display);font-size:1rem;font-weight:800;margin-bottom:6px">Foro del Café</p>
      <p style="font-size:.85rem;color:var(--text-2);margin-bottom:16px">Participa en las conversaciones con padres y especialistas.</p>
      <button class="btn btn-purple" onclick="window.location.href='cafe-foro.html'">Ir al foro →</button>
    </div>
  </div>

  <button class="fab" id="fabBtn" onclick="handleFab()">➕</button>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchMainTab('aulas',document.querySelector('.tab-btn'))">
      <span class="nav-ico">🏫</span><span>Aulas</span>
    </button>
    <button class="nav-btn" onclick="switchMainTab('mod',document.querySelectorAll('.tab-btn')[1])">
      <span class="nav-ico">✅</span><span>Revisar</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='cafe-foro.html'">
      <span class="nav-ico">💬</span><span>Comunidad</span>
    </button>
    <button class="nav-btn" onclick="logout()">
      <span class="nav-ico">🚪</span><span>Salir</span>
    </button>
  </nav>

  <!-- MODAL: Crear aula -->
  <div class="modal-overlay" id="createClassroomModal" onclick="if(event.target===this)closeModal('createClassroomModal')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">🏫 Nueva aula</p>
      <div class="field-group">
        <label class="field-label">Nombre del aula</label>
        <input class="field-input" id="newClassName" placeholder="Ej: 3er Grado A" maxlength="50">
      </div>
      <div class="field-group">
        <label class="field-label">Materia</label>
        <input class="field-input" id="newClassSubject" placeholder="Ej: Matemáticas" maxlength="40">
      </div>
      <div class="field-group">
        <label class="field-label">Color del aula</label>
        <div class="color-grid" id="colorGrid"></div>
      </div>
      <button class="btn btn-purple btn-xl" id="btnCreateClass" onclick="createClassroom()">Crear aula →</button>
    </div>
  </div>

  <!-- MODAL: Aviso -->
  <div class="modal-overlay" id="avisoModal" onclick="if(event.target===this)closeModal('avisoModal')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">📢 Nuevo aviso</p>
      <div class="field-group">
        <label class="field-label">Título</label>
        <input class="field-input" id="avisoTitle" placeholder="Título del aviso" maxlength="80">
      </div>
      <div class="field-group">
        <label class="field-label">Mensaje</label>
        <textarea class="field-input" id="avisoContent" rows="4" placeholder="Escribe el aviso..." maxlength="600" style="resize:none"></textarea>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:.88rem;font-weight:600;cursor:pointer">
        <input type="checkbox" id="avisoPinned" style="width:16px;height:16px"> Fijar este aviso arriba
      </label>
      <button class="btn btn-purple btn-xl" id="btnAviso" onclick="publishAviso()">Publicar aviso →</button>
    </div>
  </div>

  <!-- MODAL: Tarea -->
  <div class="modal-overlay" id="tareaModal" onclick="if(event.target===this)closeModal('tareaModal')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">📝 Nueva tarea</p>
      <div class="field-group">
        <label class="field-label">Título de la tarea</label>
        <input class="field-input" id="tareaTitle" placeholder="Ej: Ejercicios de fracciones" maxlength="80">
      </div>
      <div class="field-group">
        <label class="field-label">Descripción / instrucciones</label>
        <textarea class="field-input" id="tareaDesc" rows="4" placeholder="Explica qué deben hacer los alumnos..." maxlength="800" style="resize:none"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Fecha límite (opcional)</label>
        <input class="field-input" id="tareaDue" type="datetime-local">
      </div>
      <div class="field-group">
        <label class="field-label">Puntaje máximo</label>
        <input class="field-input" id="tareaMax" type="number" value="100" min="1" max="1000">
      </div>
      <button class="btn btn-purple btn-xl" id="btnTarea" onclick="publishTarea()">Asignar tarea →</button>
    </div>
  </div>

  <!-- MODAL: Material -->
  <div class="modal-overlay" id="materialModal" onclick="if(event.target===this)closeModal('materialModal')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">📁 Nuevo material</p>
      <div class="field-group">
        <label class="field-label">Título</label>
        <input class="field-input" id="matTitle" placeholder="Ej: Video sobre fracciones" maxlength="80">
      </div>
      <div class="field-group">
        <label class="field-label">Descripción (opcional)</label>
        <textarea class="field-input" id="matDesc" rows="2" placeholder="Breve descripción..." maxlength="300" style="resize:none"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Contenido / texto</label>
        <textarea class="field-input" id="matContent" rows="3" placeholder="Texto o notas del material..." maxlength="1000" style="resize:none"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Link externo (YouTube, Drive, etc.)</label>
        <input class="field-input" id="matLink" type="url" placeholder="https://...">
      </div>
      <button class="btn btn-purple btn-xl" id="btnMaterial" onclick="publishMaterial()">Publicar material →</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script>
    let profile = null, classrooms = [], activeClass = null, activeAulaTab = 'avisos';
    const COLORS = ['#0EB882','#7B68EE','#E8922A','#EF5350','#2196F3','#9C27B0','#FF9800','#00BCD4','#4CAF50','#F06292'];
    let selectedColor = COLORS[0];

    async function init() {
      const { data:{ session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../index.html'; return; }
      const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      if (!data || !['teacher','specialist'].includes(data.role)) { window.location.href = '../index.html'; return; }
      profile = data;
      document.getElementById('hdrTitle').textContent = `Hola, ${cleanName(data.full_name)?.split(' ')[0]} 👋`;
      document.getElementById('hdrSub').textContent   = data.role === 'specialist' ? 'Especialista' : 'Docente titular';
      buildColorGrid();
      await loadClassrooms();
      hideLoader();
    }

    function buildColorGrid() {
      const grid = document.getElementById('colorGrid');
      COLORS.forEach(c => {
        const dot = document.createElement('div');
        dot.className = 'color-dot' + (c === selectedColor ? ' sel' : '');
        dot.style.background = c;
        dot.onclick = () => { selectedColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('sel', d.style.background===c||d.style.backgroundColor===c)); };
        grid.appendChild(dot);
      });
    }

    function switchMainTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn?.classList.add('active');
      ['Aulas','Mod','Foro'].forEach(t => document.getElementById(`view${t}`)?.classList.remove('active'));
      document.getElementById('classroomView').classList.remove('active');
      if (tab === 'aulas') document.getElementById('viewAulas').classList.add('active');
      else document.getElementById(`view${tab.charAt(0).toUpperCase()+tab.slice(1)}`)?.classList.add('active');
      document.getElementById('fabBtn').classList.toggle('hidden', tab !== 'aulas' && !activeClass);
      if (tab === 'mod') loadModeration();
    }

    async function loadClassrooms() {
      const { data } = await sb.from('classrooms').select('*').eq('teacher_id', profile.id).order('created_at', { ascending: false });
      classrooms = data || [];
      renderClassrooms();
    }

    function renderClassrooms() {
      const grid = document.getElementById('classroomsGrid');
      grid.innerHTML = '';
      const addCard = document.createElement('div');
      addCard.className = 'add-classroom-card';
      addCard.innerHTML = '<div class="ico">➕</div><p>Nueva aula</p>';
      addCard.onclick = () => openModal('createClassroomModal');
      grid.appendChild(addCard);
      classrooms.forEach(cls => {
        const card = document.createElement('button');
        card.className = 'classroom-card';
        card.style.background = `linear-gradient(135deg, ${cls.color}dd, ${cls.color})`;
        card.style.color = 'white';
        card.innerHTML = `<div><p class="cc-subject">${esc(cls.subject||'General')}</p><p class="cc-name">${esc(cls.name)}</p></div><p class="cc-code">🔑 ${cls.code}</p>`;
        card.onclick = () => openClassroom(cls);
        grid.appendChild(card);
      });
    }

    async function createClassroom() {
      const name = document.getElementById('newClassName').value.trim();
      const subject = document.getElementById('newClassSubject').value.trim();
      if (!name) { showToast('Escribe el nombre del aula','error'); return; }
      const btn = document.getElementById('btnCreateClass');
      setButtonLoading(btn, true);
      const code = Array.from({length:6}, () => 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
      const { data, error } = await sb.from('classrooms').insert({ name, subject:subject||'General', code, teacher_id:profile.id, color:selectedColor }).select().single();
      setButtonLoading(btn, false);
      if (error) { showToast('Error al crear el aula','error'); return; }
      classrooms.unshift(data);
      renderClassrooms();
      closeModal('createClassroomModal');
      showToast(`Aula "${name}" creada · Código: ${code} 🎉`, 'success', 5000);
      document.getElementById('newClassName').value = '';
      document.getElementById('newClassSubject').value = '';
    }

    function openClassroom(cls) {
      activeClass = cls;
      document.getElementById('viewAulas').classList.remove('active');
      document.getElementById('classroomView').classList.add('active');
      document.getElementById('fabBtn').classList.remove('hidden');
      const hdr = document.getElementById('aulaHeader');
      hdr.style.background = `linear-gradient(135deg, ${cls.color}bb, ${cls.color})`;
      document.getElementById('aulaName').textContent    = cls.name;
      document.getElementById('aulaSubject').textContent = cls.subject || 'General';
      document.getElementById('aulaCode').textContent    = cls.code;
      // Reset sub-tabs
      document.querySelectorAll('.aula-tab').forEach((t,i) => { t.classList.toggle('active', i===0); t.style.background = i===0 ? cls.color : ''; t.style.color = i===0 ? 'white' : ''; });
      document.querySelectorAll('.aula-view').forEach((v,i) => v.classList.toggle('active', i===0));
      activeAulaTab = 'avisos';
      loadAvisos();
    }

    function backToAulas() {
      activeClass = null;
      document.getElementById('classroomView').classList.remove('active');
      document.getElementById('viewAulas').classList.add('active');
      document.getElementById('fabBtn').classList.remove('hidden');
    }

    function copyCode() {
      if (!activeClass) return;
      navigator.clipboard?.writeText(activeClass.code).then(() => showToast(`Código "${activeClass.code}" copiado 📋`,'success'));
    }

    function switchAulaTab(tab, btn) {
      activeAulaTab = tab;
      document.querySelectorAll('.aula-tab').forEach(b => { b.classList.remove('active'); b.style.background=''; b.style.color=''; });
      if (btn) { btn.classList.add('active'); btn.style.background = activeClass?.color||'var(--creativo)'; btn.style.color='white'; }
      document.querySelectorAll('.aula-view').forEach(v => v.classList.remove('active'));
      const tabs = ['avisos','tareas','material','entregas','alumnos'];
      const views = ['aulaAvisos','aulaTareas','aulaMaterial','aulaEntregas','aulaAlumnos'];
      const idx = tabs.indexOf(tab);
      if (idx >= 0) document.getElementById(views[idx])?.classList.add('active');
      const map = { avisos:loadAvisos, tareas:loadTareas, material:loadMaterial, entregas:loadEntregas, alumnos:loadAlumnos };
      map[tab]?.();
    }

    function handleFab() {
      if (!activeClass) { openModal('createClassroomModal'); return; }
      const map = { avisos:'avisoModal', tareas:'tareaModal', material:'materialModal' };
      const modal = map[activeAulaTab];
      if (modal) openModal(modal);
    }

    /* ── AVISOS ── */
    async function loadAvisos() {
      const list = document.getElementById('avisosList');
      list.innerHTML = empty('⏳','Cargando...','');
      const { data } = await sb.from('announcements').select('*').eq('classroom_id', activeClass.id).order('pinned',{ascending:false}).order('created_at',{ascending:false});
      if (!data||data.length===0) { list.innerHTML = empty('📢','No hay avisos aún','Publica el primer aviso con ➕'); return; }
      list.innerHTML = '';
      data.forEach(a => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `<div class="item-card-header"><p class="item-title">${esc(a.title)}</p><span class="item-date">${fmt(a.created_at)}</span></div><p class="item-body">${esc(a.content)}</p><div class="item-footer">${a.pinned?'<span class="item-badge badge-pinned">📌 Fijado</span>':''}<button class="delete-btn" onclick="del('announcements','${a.id}',loadAvisos)">🗑</button></div>`;
        list.appendChild(card);
      });
    }

    async function publishAviso() {
      const title=document.getElementById('avisoTitle').value.trim(), content=document.getElementById('avisoContent').value.trim(), pinned=document.getElementById('avisoPinned').checked;
      if (!title||!content) { showToast('Completa título y mensaje','error'); return; }
      const btn=document.getElementById('btnAviso'); setButtonLoading(btn,true);
      const {error} = await sb.from('announcements').insert({classroom_id:activeClass.id,teacher_id:profile.id,title,content,pinned});
      setButtonLoading(btn,false);
      if (error) { showToast('Error al publicar','error'); return; }
      closeModal('avisoModal');
      ['avisoTitle','avisoContent'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('avisoPinned').checked=false;
      showToast('Aviso publicado 📢','success'); loadAvisos();
    }

    /* ── TAREAS ── */
    async function loadTareas() {
      const list=document.getElementById('tareasList');
      list.innerHTML=empty('⏳','Cargando...','');
      const {data} = await sb.from('assignments').select('*, submissions(id)').eq('classroom_id',activeClass.id).order('created_at',{ascending:false});
      if (!data||data.length===0) { list.innerHTML=empty('📝','Sin tareas asignadas','Crea la primera con ➕'); return; }
      list.innerHTML='';
      data.forEach(t => {
        const isPast = t.due_date && new Date(t.due_date)<new Date();
        const subs   = t.submissions?.length||0;
        const card   = document.createElement('div');
        card.className='item-card';
        card.innerHTML=`<div class="item-card-header"><p class="item-title">${esc(t.title)}</p><span class="item-date">${fmt(t.created_at)}</span></div><p class="item-body">${esc(t.description)}</p><div class="item-footer"><span class="item-badge ${isPast?'badge-due':'badge-pending'}">${isPast?'⏰':'📅'} ${t.due_date?fmt(t.due_date):'Sin fecha'}</span><span class="item-badge badge-graded">📬 ${subs} entregas</span><button class="delete-btn" onclick="del('assignments','${t.id}',loadTareas)">🗑</button></div>`;
        list.appendChild(card);
      });
    }

    async function publishTarea() {
      const title=document.getElementById('tareaTitle').value.trim(), desc=document.getElementById('tareaDesc').value.trim(), due=document.getElementById('tareaDue').value, max=parseInt(document.getElementById('tareaMax').value)||100;
      if (!title||!desc) { showToast('Completa título y descripción','error'); return; }
      const btn=document.getElementById('btnTarea'); setButtonLoading(btn,true);
      const {error} = await sb.from('assignments').insert({classroom_id:activeClass.id,teacher_id:profile.id,title,description:desc,due_date:due||null,max_score:max});
      setButtonLoading(btn,false);
      if (error) { showToast('Error al crear la tarea','error'); return; }
      closeModal('tareaModal');
      ['tareaTitle','tareaDesc','tareaDue'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('tareaMax').value='100';
      showToast('Tarea asignada 📝','success'); loadTareas();
    }

    /* ── MATERIAL ── */
    async function loadMaterial() {
      const list=document.getElementById('materialList');
      list.innerHTML=empty('⏳','Cargando...','');
      const {data} = await sb.from('materials').select('*').eq('classroom_id',activeClass.id).order('created_at',{ascending:false});
      if (!data||data.length===0) { list.innerHTML=empty('📁','Sin material publicado','Sube el primero con ➕'); return; }
      list.innerHTML='';
      data.forEach(m => {
        const card=document.createElement('div');
        card.className='item-card';
        card.innerHTML=`<div class="item-card-header"><p class="item-title">${esc(m.title)}</p><span class="item-date">${fmt(m.created_at)}</span></div>${m.description?`<p class="item-body">${esc(m.description)}</p>`:''} ${m.content?`<p class="item-body" style="background:var(--bg);padding:8px 10px;border-radius:8px">${esc(m.content)}</p>`:''} ${m.link_url?`<a class="item-link" href="${m.link_url}" target="_blank" rel="noopener">🔗 Abrir enlace</a>`:''}<div class="item-footer"><button class="delete-btn" onclick="del('materials','${m.id}',loadMaterial)">🗑</button></div>`;
        list.appendChild(card);
      });
    }

    async function publishMaterial() {
      const title=document.getElementById('matTitle').value.trim(), desc=document.getElementById('matDesc').value.trim(), content=document.getElementById('matContent').value.trim(), link=document.getElementById('matLink').value.trim();
      if (!title) { showToast('Escribe un título','error'); return; }
      if (!content&&!link) { showToast('Agrega texto o un enlace','error'); return; }
      const btn=document.getElementById('btnMaterial'); setButtonLoading(btn,true);
      const {error} = await sb.from('materials').insert({classroom_id:activeClass.id,teacher_id:profile.id,title,description:desc||null,content:content||null,link_url:link||null,type:link?'link':'text'});
      setButtonLoading(btn,false);
      if (error) { showToast('Error al publicar','error'); return; }
      closeModal('materialModal');
      ['matTitle','matDesc','matContent','matLink'].forEach(id=>document.getElementById(id).value='');
      showToast('Material publicado 📁','success'); loadMaterial();
    }

    /* ── ENTREGAS ── */
    async function loadEntregas() {
      const list=document.getElementById('entregasList');
      list.innerHTML=empty('⏳','Cargando...','');
      const {data:tasks} = await sb.from('assignments').select('id,title,max_score,submissions(*,students(nickname,avatar_emoji))').eq('classroom_id',activeClass.id).order('created_at',{ascending:false});
      if (!tasks||tasks.length===0) { list.innerHTML=empty('📬','Sin tareas','Primero crea tareas en la pestaña Tareas'); return; }
      list.innerHTML='';
      tasks.forEach(task => {
        const subs=task.submissions||[];
        const pending=subs.filter(s=>s.status==='submitted').length;
        const h=document.createElement('div');
        h.style.cssText='margin:16px 0 8px';
        h.innerHTML=`<p style="font-family:var(--font-display);font-weight:800;font-size:.95rem">📝 ${esc(task.title)} ${pending>0?`<span class="item-badge badge-pending">${pending} sin calificar</span>`:''}</p>`;
        list.appendChild(h);
        if (subs.length===0) {
          const ep=document.createElement('p');
          ep.style.cssText='font-size:.82rem;color:var(--text-3);padding:4px 0';
          ep.textContent='Ningún alumno ha entregado aún.';
          list.appendChild(ep); return;
        }
        subs.forEach(sub => {
          const item=document.createElement('div');
          item.className='submission-item'; item.id=`sub-${sub.id}`;
          const sColors={pending:'#FFF3E0|#E65100',submitted:'#E3F2FD|#1565C0',graded:'#E8F5E9|#2E7D32'};
          const [bg,fg]=(sColors[sub.status]||'#F5F5F5|#666').split('|');
          const sLabel={pending:'Sin entregar',submitted:'Entregado',graded:'Calificado'};
          item.innerHTML=`<div class="sub-header"><span class="sub-avatar">${sub.students?.avatar_emoji||'🐻'}</span><span class="sub-student">${esc(sub.students?.nickname||'Alumno')}</span><span class="sub-status" style="background:${bg};color:${fg}">${sLabel[sub.status]||sub.status}</span></div>${sub.content?`<div class="sub-content">${esc(sub.content)}</div>`:''}${sub.link_url?`<a class="item-link" href="${sub.link_url}" target="_blank">🔗 Ver entrega</a>`:''}${sub.status==='graded'?`<p style="font-size:.82rem;color:var(--text-2)">✅ ${sub.score}/${task.max_score}${sub.feedback?` · "${esc(sub.feedback)}"`:''}</p>`:sub.status==='submitted'?`<div class="grade-row"><input class="grade-input" type="number" id="score-${sub.id}" value="${task.max_score}" min="0" max="${task.max_score}"><input class="feedback-input" id="fb-${sub.id}" placeholder="Comentario..."><button class="grade-btn" onclick="grade('${sub.id}',${task.max_score})">Calificar</button></div>`:''}`;
          list.appendChild(item);
        });
      });
    }

    async function grade(subId, maxScore) {
      const score=parseInt(document.getElementById(`score-${subId}`)?.value);
      const feedback=document.getElementById(`fb-${subId}`)?.value?.trim()||null;
      if (isNaN(score)||score<0||score>maxScore) { showToast(`Puntaje entre 0 y ${maxScore}`,'error'); return; }
      const {error} = await sb.from('submissions').update({score,feedback,status:'graded',graded_at:new Date().toISOString()}).eq('id',subId);
      if (error) { showToast('Error al calificar','error'); return; }
      showToast('¡Calificado! ✅','success'); loadEntregas();
    }

    /* ── ALUMNOS ── */
    async function loadAlumnos() {
      const list=document.getElementById('alumnosList');
      list.innerHTML=empty('⏳','Cargando...','');
      const {data} = await sb.from('classroom_students').select('students(id,nickname,avatar_emoji,points)').eq('classroom_id',activeClass.id);
      if (!data||data.length===0) { list.innerHTML=empty('👥','Sin alumnos aún',`Código: <strong>${activeClass.code}</strong>`); return; }
      list.innerHTML=`<p style="font-size:.8rem;color:var(--text-2);margin-bottom:10px">${data.length} alumno${data.length!==1?'s':''}</p>`;
      data.forEach(row => {
        const s=row.students;
        const item=document.createElement('div');
        item.className='item-card';
        item.style.cssText='display:flex;align-items:center;gap:12px';
        item.innerHTML=`<span style="font-size:1.5rem">${s.avatar_emoji||'🐻'}</span><span style="font-weight:700;flex:1">${esc(s.nickname)}</span><span style="font-family:var(--font-display);font-size:.85rem;font-weight:800;color:var(--creativo-dark);background:var(--creativo-light);padding:3px 10px;border-radius:999px">⭐ ${s.points||0}</span>`;
        list.appendChild(item);
      });
    }

    /* ── MODERACIÓN ── */
    async function loadModeration() {
      const list=document.getElementById('modList'); list.innerHTML='';
      const {data} = await sb.from('creations').select('*,students(nickname,avatar_emoji)').eq('approved',false).order('created_at',{ascending:false}).limit(20);
      if (!data||data.length===0) { list.innerHTML=empty('✅','¡Todo al día!','No hay publicaciones pendientes.'); return; }
      data.forEach(c => {
        const card=document.createElement('div'); card.className='item-card'; card.id=`mod-${c.id}`;
        card.innerHTML=`<div class="item-card-header"><p class="item-title">${c.students?.avatar_emoji||'🐻'} ${esc(c.students?.nickname||'Anónimo')}</p><span class="item-date">${c.type==='cuento'?'📖':'💬'} ${c.type}</span></div>${c.title?`<p style="font-weight:700;font-size:.88rem;margin-bottom:4px">${esc(c.title)}</p>`:''}<p class="item-body">${esc(c.content||'')}</p><div class="item-footer"><button style="flex:1;padding:9px;border-radius:999px;background:#E8F5E9;color:#2E7D32;border:1.5px solid #A5D6A7;font-weight:700;font-size:.82rem;cursor:pointer" onclick="moderate('${c.id}',true)">✅ Aprobar</button><button style="flex:1;padding:9px;border-radius:999px;background:#FFEBEE;color:#C62828;border:1.5px solid #FFCDD2;font-weight:700;font-size:.82rem;cursor:pointer" onclick="moderate('${c.id}',false)">🗑 Rechazar</button></div>`;
        list.appendChild(card);
      });
    }

    async function moderate(id, approve) {
      if (approve) await sb.from('creations').update({approved:true}).eq('id',id);
      else         await sb.from('creations').delete().eq('id',id);
      document.getElementById(`mod-${id}`)?.remove();
      showToast(approve?'¡Publicado! ✅':'Eliminado 🗑', approve?'success':'info');
    }

    /* ── HELPERS ── */
    async function del(table, id, fn) { if(!confirm('¿Eliminar?'))return; await sb.from(table).delete().eq('id',id); showToast('Eliminado','info'); fn(); }
    function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
    function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
    function empty(ico, title, sub) { return `<div class="empty-state"><div class="ico">${ico}</div><p style="font-weight:700;color:var(--text);font-size:.95rem">${title}</p><p style="margin-top:4px;font-size:.82rem">${sub}</p></div>`; }
    function fmt(d) { return new Date(d).toLocaleDateString('es',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    async function logout() { await sb.auth.signOut(); window.location.href = '../index.html'; }

    init();
  </script>
</body>
</html>
